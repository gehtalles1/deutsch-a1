<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>06-可分动词拆拆乐 | 手机优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        /* 核心修复：确保内容在手机屏幕垂直居中 */
        body { 
            background-color: #F8FAFC; 
            font-family: 'Noto Sans SC', sans-serif; 
            color: #1E293B; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 垂直方向居中 */
            height: 100vh; /* 占满全屏高度 */
        }

        /* 顶部导航固定在上方 */
        .nav-header {
            position: absolute;
            top: 10px;
            width: 100%;
            max-width: 440px;
            padding: 0 16px;
        }

        .nav-bar { width: 100%; display: flex; align-items: center; gap: 12px; }
        .progress-container { flex-grow: 1; height: 10px; background: white; border-radius: 10px; border: 1.5px solid #E2E8F0; overflow: hidden; }

        /* 答题主体区：往上提的视觉调整 */
        .quiz-container {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            margin-top: -20px; /* 视觉微调，让画面稍微偏上一点更符合操作习惯 */
        }

        .sentence-card { 
            width: 100%; min-height: 160px;
            padding: 24px 16px; background: white; border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #F1F5F9;
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; 
            gap: 10px; font-size: 1.5rem; font-weight: 800; 
        }

        .slot-box { min-width: 85px; border-bottom: 4px solid #CBD5E1; color: #0EA5E9; height: 45px; display: flex; align-items: center; justify-content: center; }
        .p-placeholder { min-width: 50px; border-bottom: 4px solid #E2E8F0; height: 45px; display: inline-flex; align-items: center; justify-content: center; color: #CBD5E1; }

        /* 选项网格：防止被底部遮挡 */
        .options-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .option-item { 
            background: white; border-radius: 15px; border: 2px solid #E2E8F0; 
            border-bottom: 5px solid #E2E8F0; font-size: 1.2rem; font-weight: 800; 
            color: #475569; padding: 12px 0; transition: all 0.1s; 
        }
        .option-item:active { transform: translateY(4px); border-bottom-width: 2px; }
        .option-item.correct { background: #0EA5E9 !important; border-color: #0284C7 !important; color: white !important; }

        #teacher-tip { position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); width: 85%; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; }
        #teacher-tip.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="nav-bar">
            <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-sm border border-slate-100">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </div>
            <div class="progress-container"><div id="progress" class="h-full bg-sky-500 w-0 transition-all duration-500"></div></div>
            <button id="mute-btn" class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-sm border border-slate-100 text-lg">🔊</button>
        </div>
        <div class="flex justify-end mt-2"><span id="counter" class="text-xs font-black text-slate-300 italic">0/30</span></div>
    </div>

    <div class="quiz-container">
        <div class="mb-6 text-center">
            <div class="bg-white rounded-2xl px-6 py-3 inline-flex text-[1.8rem] font-black shadow-sm border border-slate-100">
                <span id="p-src" class="text-sky-500">mit</span><span id="v-src" class="text-slate-700">kommen</span>
            </div>
            <p id="mean" class="text-slate-400 font-bold mt-2 italic text-base">一起去吗？</p>
        </div>

        <div class="sentence-card">
            <span id="pre-text"></span>
            <div id="v-target" class="slot-box"></div>
            <span id="post-text">du heute Nachmittag</span>
            <div class="flex items-center gap-1">
                <div id="p-placeholder" class="p-placeholder">___</div>
                <span id="punc" class="opacity-30">?</span>
            </div>
        </div>

        <div id="options-grid" class="options-grid">
            <button class="option-item">Kommt</button>
            <button class="option-item">Kommen</button>
            <button class="option-item">Kommst</button>
            <button class="option-item">Komme</button>
        </div>
    </div>

    <div id="teacher-tip">
        <div class="bg-slate-800 text-white p-4 rounded-2xl shadow-2xl border-l-4 border-sky-400">
            <p class="text-sky-400 text-sm font-black mb-1">💡 老师点评：</p>
            <p id="tip-content" class="text-sm">疑问句动词提前，主语 du 对应的词尾是 -st。</p>
        </div>
    </div>

</body>
</html>
