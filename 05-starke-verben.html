<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第 5 关：强变化动词急救包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { background-color: #F8FAFC; font-family: 'Noto Sans SC', sans-serif; color: #1E293B; overflow: hidden; touch-action: manipulation; }
        .option-btn { background: white; border-radius: 20px; border: 1px solid #E2E8F0; border-bottom: 4px solid #E2E8F0; transition: all 0.1s; cursor: pointer; position: relative; }
        .option-btn:active:not(.disabled) { transform: translateY(2px); border-bottom-width: 1px; }
        .option-btn.correct { background: #58CC02 !important; border-color: #46A302 !important; color: white !important; transform: scale(1.05); }
        .option-btn.wrong { background: #F43F5E !important; border-color: #BE123C !important; color: white !important; }
        .progress-fill { transition: width 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake-effect { animation: shake 0.2s ease-in-out 0s 2; }
        #success-overlay { backdrop-filter: blur(8px); visibility: hidden; opacity: 0; transition: all 0.5s; z-index: 100; }
        #success-overlay.active { visibility: visible; opacity: 1; }
        .sentence-container { display: flex; align-items: baseline; justify-content: center; gap: 0.75rem; min-height: 4rem; }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen pt-12 px-6">

    <nav class="w-full max-w-[440px] flex items-center gap-4 mb-10 z-10">
        <button onclick="location.href='index.html'" class="shrink-0 active:scale-90 transition-transform">
            <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="flex-grow">
            <div class="flex justify-between items-end mb-1.5 px-1">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">急救进度</span>
                <span id="score-text" class="text-xs font-bold text-[#58CC02] tracking-tighter">0/40</span>
            </div>
            <div class="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden border border-slate-50">
                <div id="progress-bar" class="h-full bg-[#58CC02] progress-fill" style="width: 0%"></div>
            </div>
        </div>
        <button id="mute-btn" onclick="toggleMute()" class="shrink-0 w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm border border-slate-100 active:bg-slate-50">
            <span id="mute-icon" class="text-xl">🔊</span>
        </button>
    </nav>

    <div id="main-card" class="bg-white w-full max-w-[400px] p-8 pb-14 rounded-[32px] border-x border-t border-slate-100 border-b-[6px] border-slate-200 text-center relative mb-8">
        <div id="hint-tag" class="absolute -top-6 left-1/2 -translate-x-1/2 w-[85%] px-4 py-3 bg-rose-500 text-white text-xs font-black rounded-2xl shadow-xl opacity-0 transition-all duration-300leading-tight">
            口诀激活
        </div>
        <div class="mb-10 mt-4">
            <h2 id="verb-display" class="text-5xl font-black text-slate-800 mb-2 tracking-tighter">fahren</h2>
            <p id="meaning-display" class="text-slate-400 font-bold italic">乘车，行驶</p>
        </div>
        <div class="sentence-container">
            <span id="pronoun" class="text-5xl font-black text-rose-600 leading-none">Sie</span>
            <div class="relative min-w-[160px] border-b-4 border-slate-100">
                <span id="answer-placeholder" class="text-5xl font-black text-slate-800 leading-none"></span>
            </div>
        </div>
    </div>

    <div id="options-grid" class="grid grid-cols-2 gap-4 w-full max-w-[400px]"></div>

    <div id="success-overlay" class="fixed inset-0 bg-white/95 flex flex-col items-center justify-center p-10 text-center">
        <div class="mb-6 text-7xl">🚑</div>
        <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tighter">急救成功！</h2>
        <p class="text-slate-500 font-bold mb-12 leading-relaxed">现在的你，稳拿强变化动词的分数！</p>
        <button onclick="location.href='index.html'" class="w-full max-w-[240px] py-5 bg-[#58CC02] border-b-[4px] border-[#46A302] text-white font-black rounded-2xl shadow-xl active:translate-y-1 transition-all">
            收下勋章并返回
        </button>
    </div>

    <script>
        const rawVerbs = [
            { v: 'fahren', m: '乘车/行驶', a: {Du: 'fährst', Er: 'fährt', Sie: 'fährt', Es: 'fährt'}, o: ['fährst', 'fährt', 'fahrt', 'fahre'], k: '⚠️ 变音警报：a 变 ä' },
            { v: 'essen', m: '吃', a: {Du: 'isst', Er: 'isst', Sie: 'isst', Es: 'isst'}, o: ['isst', 'esst', 'est', 'essen'], k: '🍔 口诀：e 变 i' },
            { v: 'geben', m: '给', a: {Du: 'gibst', Er: 'gibt', Sie: 'gibt', Es: 'gibt'}, o: ['gibst', 'gebst', 'gibt', 'gebt'], k: '🎁 变化：e 变 i' },
            { v: 'nehmen', m: '拿/服用', a: {Du: 'nimmst', Er: 'nimmt', Sie: 'nimmt', Es: 'nimmt'}, o: ['nimmst', 'nimmt', 'nehmst', 'nehmt'], k: '💊 叮嘱：双写 mm，e 变 i' },
            { v: 'lesen', m: '读', a: {Du: 'liest', Er: 'liest', Sie: 'liest', Es: 'liest'}, o: ['liest', 'lest', 'liesest', 'lesen'], k: '📚 长音：e 变 ie' },
            { v: 'sprechen', m: '说/讲', a: {Du: 'sprichst', Er: 'spricht', Sie: 'spricht', Es: 'spricht'}, o: ['sprichst', 'spricht', 'sprecht', 'spreche'], k: '🗣️ 说话：e 变 i' },
            { v: 'helfen', m: '帮助', a: {Du: 'hilfst', Er: 'hilft', Sie: 'hilft', Es: 'hilft'}, o: ['hilfst', 'hilft', 'helft', 'helfe'], k: '🤝 信号：e 变 i' },
            { v: 'sehen', m: '看', a: {Du: 'siehst', Er: 'sieht', Sie: 'sieht', Es: 'sieht'}, o: ['siehst', 'sieht', 'seht', 'sehe'], k: '👀 注意：e 变 ie' },
            { v: 'waschen', m: '洗', a: {Du: 'wäschst', Er: 'wäscht', Sie: 'wäscht', Es: 'wäscht'}, o: ['wäschst', 'wäscht', 'waschst', 'wascht'], k: '🧼 洗刷：a 变 ä' },
            { v: 'laufen', m: '跑', a: {Du: 'läufst', Er: 'läuft', Sie: 'läuft', Es: 'läuft'}, o: ['läufst', 'läuft', 'lauft', 'laufst'], k: '🏃 跑跑：au 变 äu' },
            { v: 'backen', m: '烘焙', a: {Du: 'bäckst', Er: 'bäckt', Sie: 'bäckt', Es: 'bäckt'}, o: ['bäckst', 'bäckt', 'backt', 'backst'], k: '🥐 香喷：a 变 ä' },
            { v: 'schlafen', m: '睡觉', a: {Du: 'schläfst', Er: 'schläft', Sie: 'schläft', Es: 'schläft'}, o: ['schläfst', 'schläft', 'schlaft', 'schlafst'], k: '😴 梦话：a 变 ä' },
            { v: 'tragen', m: '穿/戴/背', a: {Du: 'trägst', Er: 'trägt', Sie: 'trägt', Es: 'trägt'}, o: ['trägst', 'trägt', 'tragt', 'tragst'], k: '🎒 背起：a 变 ä' }
        ];

        let gameDeck = [];
        function generateDeck() {
            gameDeck = [];
            let lastVerb = "";
            while(gameDeck.length < 40) {
                const verb = rawVerbs[Math.floor(Math.random() * rawVerbs.length)];
                if(verb.v === lastVerb) continue;
                lastVerb = verb.v;
                const pKeys = Object.keys(verb.a);
                const p = pKeys[Math.floor(Math.random() * pKeys.length)];
                gameDeck.push({ v: verb.v, m: verb.m, p: p, a: verb.a[p], k: verb.k, o: verb.o });
            }
        }

        let currentIdx = 0, isMuted = false, canClick = true;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 升级版合成音效：模拟钢琴提示音
        function playTone(freq, duration) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; // 三角波，声音更圆润
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            // 包络：快速开始，指数衰减
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-icon').innerText = isMuted ? "🔇" : "🔊";
        }

        function loadQuestion() {
            canClick = true;
            const q = gameDeck[currentIdx];
            document.getElementById('verb-display').innerText = q.v;
            document.getElementById('meaning-display').innerText = q.m;
            document.getElementById('pronoun').innerText = q.p;
            document.getElementById('answer-placeholder').innerText = '';
            document.getElementById('answer-placeholder').classList.remove('text-rose-600');
            document.getElementById('hint-tag').classList.replace('opacity-100', 'opacity-0');
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            [...q.o].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn py-6 text-2xl font-black text-slate-700';
                btn.innerText = opt;
                btn.onclick = (e) => checkAnswer(opt, btn, e);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(userVal, btn, e) {
            if(!canClick) return;
            const q = gameDeck[currentIdx];
            if (userVal === q.a) {
                canClick = false;
                btn.classList.add('correct');
                document.getElementById('answer-placeholder').innerText = q.a;
                document.getElementById('answer-placeholder').classList.add('text-rose-600');
                
                // 1. 播放质感“叮”声 (钢琴 A5)
                playTone(880, 0.4);
                
                // 2. 点击小烟花 (从鼠标位置爆破)
                confetti({
                    particleCount: 20,
                    spread: 40,
                    origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight },
                    colors: ['#58CC02', '#A8FF6D', '#FFFFFF'],
                    disableForReducedMotion: true
                });

                setTimeout(() => {
                    currentIdx++; updateUI();
                    if (currentIdx < 40) loadQuestion();
                    else finishGame();
                }, 1200); 
            } else {
                btn.classList.add('wrong');
                playTone(146.83, 0.3); // 锯齿波错误音
                if (navigator.vibrate) navigator.vibrate(100);
                document.getElementById('main-card').classList.add('shake-effect');
                setTimeout(() => document.getElementById('main-card').classList.remove('shake-effect'), 400);
                const tag = document.getElementById('hint-tag');
                tag.innerText = q.k;
                tag.classList.replace('opacity-0', 'opacity-100');
            }
        }

        function updateUI() {
            document.getElementById('progress-bar').style.width = (currentIdx / 40 * 100) + '%';
            document.getElementById('score-text').innerText = `${currentIdx}/40`;
        }

        function finishGame() {
            localStorage.setItem('level5_cleared', 'true');
            // 3. 通关大烟花
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            // 显示高颜值成功遮罩
            document.getElementById('success-overlay').classList.add('active');
        }

        generateDeck();
        loadQuestion();
    </script>
</body>
</html>
