<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>德语 A1 闯关 - 第一关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; color: #064E3B; -webkit-tap-highlight-color: transparent; }
        .game-card { background: white; border-radius: 40px; border: 2px solid #F1EFE0; }
        .option-btn { transition: all 0.2s; border: 2px solid #F1EFE0; border-radius: 25px; font-weight: 900; }
        .correct { background: #059669 !important; color: white !important; border-color: #059669 !important; }
        .wrong { background: #EF4444 !important; color: white !important; border-color: #EF4444 !important; }
    </style>
</head>
<body class="py-12 px-6">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="window.location.href='index.html'" class="text-emerald-800 font-bold">✕ 退出</button>
            <div id="counter" class="font-black text-emerald-900 text-xl">0/50</div>
        </div>

        <div class="game-card p-10 text-center shadow-lg">
            <div id="word" class="text-5xl font-black text-emerald-950 mb-4">加载中...</div>
            <div id="meaning" class="text-emerald-600/50 font-bold mb-10 text-lg">...</div>
            
            <div class="grid gap-4">
                <button onclick="check('der')" class="option-btn py-5 text-xl bg-blue-50/50">Der (阳性)</button>
                <button onclick="check('die')" class="option-btn py-5 text-xl bg-pink-50/50">Die (阴性)</button>
                <button onclick="check('das')" class="option-btn py-5 text-xl bg-green-50/50">Das (中性)</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-emerald-950/90 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white rounded-[40px] p-12 text-center w-full max-w-xs">
            <div id="medal-icon" class="text-8xl mb-6"></div>
            <h2 id="final-score" class="text-3xl font-black text-emerald-950 mb-8"></h2>
            <button onclick="window.location.href='index.html'" class="w-full py-5 bg-emerald-950 text-white rounded-3xl font-black text-lg">回到主页领取勋章</button>
        </div>
    </div>

    <script>
        const data = [
            {w:"Apfel",g:"der",m:"苹果"}, {w:"Banane",g:"die",m:"香蕉"}, {w:"Auto",g:"das",m:"汽车"},
            {w:"Vater",g:"der",m:"父亲"}, {w:"Mutter",g:"die",m:"母亲"}, {w:"Kind",g:"das",m:"孩子"},
            {w:"Tisch",g:"der",m:"桌子"}, {w:"Tasche",g:"die",m:"包"}, {w:"Buch",g:"das",m:"书"},
            {w:"Stuhl",g:"der",m:"椅子"}, {w:"Lampe",g:"die",m:"灯"}, {w:"Haus",g:"das",m:"房子"},
            {w:"Hund",g:"der",m:"狗"}, {w:"Katze",g:"die",m:"猫"}, {w:"Pferd",g:"das",m:"马"},
            {w:"Lehrer",g:"der",m:"男老师"}, {w:"Lehrerin",g:"die",m:"女老师"}, {w:"Mädchen",g:"das",m:"女孩"},
            {w:"Kaffee",g:"der",m:"咖啡"}, {w:"Milch",g:"die",m:"牛奶"}, {w:"Wasser",g:"das",m:"水"},
            {w:"Tag",g:"der",m:"白天"}, {w:"Nacht",g:"die",m:"夜晚"}, {w:"Jahr",g:"das",m:"年份"},
            {w:"Computer",g:"der",m:"电脑"}, {w:"Handy",g:"das",m:"手机"}, {w:"Bett",g:"das",m:"床"},
            {w:"Schlüssel",g:"der",m:"钥匙"}, {w:"Tür",g:"die",m:"门"}, {w:"Fenster",g:"das",m:"窗户"},
            {w:"Wein",g:"der",m:"葡萄酒"}, {w:"Bier",g:"das",m:"啤酒"}, {w:"Pizza",g:"die",m:"比萨"},
            {w:"Park",g:"der",m:"公园"}, {w:"Stadt",g:"die",m:"城市"}, {w:"Kino",g:"das",m:"电影院"},
            {w:"Bus",g:"der",m:"公交车"}, {w:"Taxi",g:"das",m:"出租车"}, {w:"Fahrrad",g:"das",m:"自行车"},
            {w:"Bruder",g:"der",m:"兄弟"}, {w:"Schwester",g:"die",m:"姐妹"}, {w:"Baby",g:"das",m:"婴儿"},
            {w:"Sonne",g:"die",m:"太阳"}, {w:"Regen",g:"der",m:"雨"}, {w:"Licht",g:"das",m:"光"},
            {w:"Opa",g:"der",m:"爷爷"}, {w:"Oma",g:"die",m:"奶奶"}, {w:"Markt",g:"der",m:"市场"},
            {w:"Schule",g:"die",m:"学校"}, {w:"Hotel",g:"das",m:"酒店"}
        ];

        let idx = 0, score = 0;
        function load() {
            if(idx >= data.length) return end();
            document.getElementById('word').innerText = data[idx].w;
            document.getElementById('meaning').innerText = data[idx].m;
            document.getElementById('counter').innerText = `${idx}/50`;
        }

        function check(ans) {
            const correct = data[idx].g;
            const btns = document.querySelectorAll('.option-btn');
            if(ans === correct) {
                score++;
                btns.forEach(b => { if(b.innerText.toLowerCase().includes(ans)) b.classList.add('correct'); });
            } else {
                btns.forEach(b => {
                    if(b.innerText.toLowerCase().includes(ans)) b.classList.add('wrong');
                    if(b.innerText.toLowerCase().includes(correct)) b.classList.add('correct');
                });
            }
            setTimeout(() => {
                btns.forEach(b => b.classList.remove('correct', 'wrong'));
                idx++; load();
            }, 500);
        }

        function end() {
            localStorage.setItem('stage1_cleared', 'true');
            const medal = score === 50 ? 'gold' : 'silver';
            localStorage.setItem('stage1_medal', medal);
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('medal-icon').innerText = medal === 'gold' ? '🥇' : '🥈';
            document.getElementById('final-score').innerText = `得分: ${score}/50`;
        }
        load();
    </script>
</body>
</html>
