<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>挑战中</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap');
        body { background: #FFFFFF; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .option-btn { 
            border-radius: 20px; font-weight: 900; font-size: 24px; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center; padding: 25px 0;
        }
        .btn-der { background: #E5F3FF; color: #1899FF; border-bottom: 6px solid #ADCFFF; }
        .btn-die { background: #FFEBEE; color: #FF4B4B; border-bottom: 6px solid #FFC1C1; }
        .btn-das { background: #E8F5E9; color: #43A047; border-bottom: 6px solid #C8E6C9; }
        .option-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        .progress-container { height: 16px; background: #E5E5E5; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #58CC02; transition: width 0.3s; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[480px] mx-auto h-screen flex flex-col">
        <div class="flex items-center gap-4 mt-4 mb-12">
            <button onclick="location.href='index.html'" class="text-[#AFAFAF] font-black text-2xl">✕</button>
            <div class="progress-container flex-1">
                <div id="progress" class="progress-bar" style="width: 10%"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-center text-center">
            <h1 id="word" class="text-6xl font-black text-[#3C3C3C] mb-4">加载中</h1>
            <p id="mean" class="text-2xl font-black text-[#AFAFAF]"></p>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-12">
            <button onclick="check('der')" class="option-btn btn-der">der</button>
            <button onclick="check('die')" class="option-btn btn-die">die</button>
            <button onclick="check('das')" class="option-btn btn-das">das</button>
        </div>
    </div>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        const quiz = [
            {w:"Apfel", m:"苹果", a:"der"}, {w:"Banane", m:"香蕉", a:"die"},
            {w:"Kind", m:"小孩", a:"das"}, {w:"Tisch", m:"桌子", a:"der"},
            {w:"Blume", m:"花朵", a:"die"}, {w:"Auto", m:"汽车", a:"das"}
        ];
        let cur = 0;

        function load() {
            document.getElementById('word').innerText = quiz[cur].w;
            document.getElementById('mean').innerText = quiz[cur].m;
            document.getElementById('progress').style.width = ((cur + 1) / quiz.length * 100) + "%";
        }

        function check(a) {
            if(a === quiz[cur].a) {
                document.getElementById('snd-correct').play(); // 🚨 声效播放
                if(cur < quiz.length - 1) { cur++; setTimeout(load, 300); }
                else {
                    document.getElementById('snd-win').play();
                    localStorage.setItem('stage1_cleared', 'true');
                    setTimeout(() => { alert("太棒了！稳过 A1！"); location.href='index.html'; }, 500);
                }
            } else {
                navigator.vibrate ? navigator.vibrate(50) : null; // 答错震动
            }
        }

        window.onload = load;
    </script>
</body>
</html>
