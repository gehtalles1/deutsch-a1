<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名词词性捕手 | 刘老师德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #FFFFFF; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .opt-btn { border-radius: 24px; font-weight: 900; font-size: 24px; transition: all 0.1s ease; display: flex; align-items: center; justify-content: center; padding: 24px 0; border-bottom: 6px solid #CBD5E1; }
        .opt-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        .btn-der { background: #F0F9FF; color: #0EA5E9; border-color: #BAE6FD; }
        .btn-die { background: #FEF2F2; color: #EF4444; border-color: #FECACA; }
        .btn-das { background: #F0FDF4; color: #22C55E; border-color: #BBF7D0; }
        .progress-rail { height: 12px; background: #F1F5F9; border-radius: 100px; }
        .progress-fill { height: 100%; background: #58CC02; border-radius: 100px; transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #tips-card { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #tips-card.show { transform: translateY(0); }
    </style>
</head>
<body class="p-8 flex justify-center">
    <div class="max-w-[440px] w-full h-screen flex flex-col relative">
        <div class="flex items-center gap-5 mt-4 mb-12">
            <button onclick="location.href='index.html'" class="text-slate-300 hover:text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg></button>
            <div class="progress-rail flex-1"><div id="bar" class="progress-fill" style="width: 0%"></div></div>
        </div>
        <div class="flex-grow flex flex-col justify-center text-center">
            <div class="mb-2"><span id="counter" class="text-xs font-black text-slate-300 uppercase tracking-widest">Question 1 / 50</span></div>
            <h1 id="word" class="text-6xl lg:text-7xl font-black text-slate-900 mb-6 tracking-tighter"></h1>
            <p id="mean" class="text-2xl font-bold text-slate-400"></p>
        </div>
        <div class="grid grid-cols-1 gap-4 mb-12">
            <button onclick="judge('der')" class="opt-btn btn-der shadow-sm">der</button>
            <button onclick="judge('die')" class="opt-btn btn-die shadow-sm">die</button>
            <button onclick="judge('das')" class="opt-btn btn-das shadow-sm">das</button>
        </div>
        <div id="tips-overlay" class="hidden fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40"></div>
        <div id="tips-card" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-10 z-50 border-t-4 border-rose-100 shadow-2xl">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-rose-100 rounded-2xl flex items-center justify-center text-2xl">💡</div>
                <h4 class="text-xl font-black text-slate-800">刘老师的小贴士</h4>
            </div>
            <p id="tips-content" class="text-slate-500 font-bold leading-relaxed mb-8 text-lg"></p>
            <button onclick="hideTip()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xl">记住了，继续！</button>
        </div>
    </div>
    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-err" src="https://assets.mixkit.co/active_storage/sfx/1150/1150-preview.mp3"></audio>
    <script>
        const database = [
            {w:"Apfel", m:"苹果", a:"der", t:"阳性名词规律：大部分水果结尾没有e的通常是der。"},
            {w:"Banane", m:"香蕉", a:"die", t:"阴性名词规律：以 -e 结尾的名词 90% 都是 die。"},
            {w:"Mädchen", m:"女孩", a:"das", t:"中性名词规律：所有以 -chen 结尾的小称词全是 das。"},
            {w:"Zeitung", m:"报纸", a:"die", t:"阴性名词规律：以 -ung 结尾的词 100% 是 die。"},
            {w:"Bäckerei", m:"面包店", a:"die", t:"阴性名词规律：以 -ei 结尾的词通常是 die。"},
            {w:"Auto", m:"汽车", a:"das", t:"大部分外来语词汇在德语中趋向于中性 das。"}
            // 这里可以继续补全到50个
        ];
        let current = 0; let wrongCount = 0;
        function update() {
            const data = database[current];
            document.getElementById('word').innerText = data.w;
            document.getElementById('mean').innerText = data.m;
            document.getElementById('counter').innerText = `Question ${current + 1} / ${database.length}`;
            document.getElementById('bar').style.width = `${(current / database.length) * 100}%`;
        }
        function judge(choice) {
            if (choice === database[current].a) { document.getElementById('snd-ok').play(); next(); }
            else { 
                wrongCount++; document.getElementById('snd-err').play();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // 震动反馈
                showTip(database[current].t); 
            }
        }
        function showTip(text) {
            document.getElementById('tips-content').innerText = text;
            document.getElementById('tips-overlay').classList.remove('hidden');
            document.getElementById('tips-card').classList.add('show');
        }
        function hideTip() {
            document.getElementById('tips-overlay').classList.add('hidden');
            document.getElementById('tips-card').classList.remove('show');
            next();
        }
        function next() {
            if (current < database.length - 1) { current++; update(); }
            else {
                const currentResult = (wrongCount === 0) ? 'gold' : 'silver';
                const previousBest = localStorage.getItem('stage1_score');
                if (currentResult === 'gold' || !previousBest) { localStorage.setItem('stage1_score', currentResult); } // 保留最高荣誉
                localStorage.setItem('stage1_cleared', 'true');
                alert(currentResult === 'gold' ? "完美！金牌到手！" : "练习完成！获得银牌。");
                location.href = 'index.html';
            }
        }
        window.onload = update;
    </script>
</body>
</html>
