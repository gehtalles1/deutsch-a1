<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>19-时间表达魔法课 | 完美修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        body { background: #0F172A; font-family: 'Noto Sans SC', sans-serif; height: 100svh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; color: white; }
        .app-container { width: 100%; max-width: 600px; height: 100%; background: linear-gradient(180deg, #111827 0%, #0F172A 100%); position: relative; display: flex; flex-direction: column; }
        
        /* 顶部导航 */
        .header-nav { padding: 20px 20px 5px; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .nav-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
        .progress-wrapper { flex: 1; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #A855F7, #EC4899); transition: 0.6s ease-out; }
        #progress-num { text-align: center; font-size: 0.85rem; font-weight: 900; color: #475569; margin-top: 5px; }

        /* 动态图标 */
        .icon-display { height: 120px; display: flex; align-items: center; justify-content: center; }
        .main-emoji { font-size: 4.5rem; animation: breathe 2.5s infinite ease-in-out; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.4)); }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* 对话区：强对比设计 */
        .challenge-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; }
        .dialog-container { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 18px 22px; border-radius: 24px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .bubble-a { background: #1F2937; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #374151; }
        .bubble-b { background: #312E81; align-self: flex-end; border-bottom-right-radius: 4px; border: 2px solid #4F46E5; }
        
        .role-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .label-a { color: #9CA3AF; }
        .label-b { color: #C7D2FE; }

        .sentence { font-size: 1.55rem; font-weight: 800; line-height: 1.3; color: #FFFFFF; }
        .trans-hint { font-size: 0.9rem; color: #94A3B8; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); display: block; }
        .bubble-b .trans-hint { color: #A5B4FC; }

        .gap { display: inline-block; min-width: 70px; border-bottom: 4px solid #F472B6; color: #F472B6; text-align: center; margin: 0 8px; }

        /* 选项按钮 */
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 10px 20px 40px; }
        .opt-btn { 
            background: #1E293B; border: 2px solid #334155; border-radius: 20px; height: 75px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; font-weight: 800; transition: 0.2s; cursor: pointer;
            box-shadow: 0 4px 0 #0F172A;
        }
        .opt-btn.correct { background: #10B981 !important; border-color: #10B981; box-shadow: 0 4px 0 #059669; }
        .opt-btn.wrong { background: #EF4444 !important; border-color: #EF4444; animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-8px)} 75% {transform:translateX(8px)} }

        .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; }
        .card { background: #1F2937; border-radius: 32px; padding: 30px; width: 100%; border: 1px solid #374151; text-align: center; }
        .btn-magic { width: 100%; padding: 18px; background: #6366F1; color: white; border-radius: 20px; font-weight: 900; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-fail" src="https://assets.mixkit.co/active_storage/sfx/2101/2101-preview.mp3"></audio>

    <div class="app-container">
        <div class="header-nav">
            <div class="nav-btn" onclick="location.href='index.html'">🔙</div>
            <div class="progress-wrapper"><div id="progress-fill"></div></div>
            <div id="mute-btn" class="nav-btn" onclick="toggleMute()">🔊</div>
        </div>
        <div id="progress-num">0 / 20</div>

        <div class="icon-display"><div id="main-emoji" class="main-emoji">⏰</div></div>

        <div class="challenge-area">
            <div class="dialog-container">
                <div class="bubble bubble-a">
                    <span class="role-label label-a">Frage</span>
                    <div id="q-a" class="sentence"></div>
                    <span id="q-a-trans" class="trans-hint"></span>
                </div>
                <div class="bubble bubble-b">
                    <span class="role-label label-b">Antwort</span>
                    <div id="q-b" class="sentence"></div>
                    <span id="q-b-trans" class="trans-hint"></span>
                </div>
            </div>
        </div>

        <div id="options-grid" class="options-grid"></div>

        <div id="tip-layer" class="overlay">
            <div class="card">
                <div class="text-6xl mb-4">🔮</div>
                <h3 class="text-xl font-bold text-indigo-400 mb-2">魔法纠错</h3>
                <p id="tip-msg" class="text-slate-300 leading-relaxed text-md mb-6"></p>
                <button onclick="closeTip()" class="btn-magic">领悟了</button>
            </div>
        </div>

        <div id="win-layer" class="overlay">
            <div class="text-8xl mb-6">✨</div>
            <h3 class="text-3xl font-black text-white mb-2">时间守护大师</h3>
            <p class="text-slate-400 font-medium mb-8">20 个时间挑战全部达成！</p>
            <button onclick="finishLevel()" class="btn-magic" style="background: linear-gradient(90deg, #A855F7, #EC4899);">点亮勋章</button>
        </div>
    </div>

    <script>
        const quizBank = [
            { a: "Wie spät ist es?", at: "现在几点？", b: "Es ist _____ Uhr.", bt: "现在两点整。", ans: "zwei", opts: ["zwei", "zweiten", "am zwei", "um zwei"], icon: "🕑", tip: "直接用数字 + Uhr 表示几点整。" },
            { a: "Wann kommst du?", at: "你什么时候来？", b: "Ich komme _____ Montag.", bt: "我周一过来。", ans: "am", opts: ["am", "im", "um", "an"], icon: "📅", tip: "星期前固定用 <b>am</b>。" },
            { a: "Wann beginnt der Kurs?", at: "课程几点开始？", b: "_____ 20 Uhr.", bt: "在20点开始。", ans: "Um", opts: ["Am", "Um", "Im", "Zu"], icon: "🎓", tip: "具体时刻点用 <b>Um</b>。" },
            { a: "Wie viel Uhr ist es?", at: "现在几点？", b: "Viertel _____ acht.", bt: "八点一刻 (8:15)。", ans: "nach", opts: ["vor", "nach", "auf", "in"], icon: "☕", tip: "<b>nach</b> 表示过了几分。" },
            { a: "Wann treffen wir uns?", at: "我们几点见？", b: "Um halb _____.", bt: "在九点半 (9:30)。", ans: "zehn", opts: ["neun", "zehn", "acht", "elf"], icon: "🤝", tip: "<b>halb zehn</b> 是10点的一半，即 9:30。" },
            { a: "Der wievielte ist heute?", at: "今天几号？", b: "Der _____ Mai.", bt: "五月一号。", ans: "erste", opts: ["ein", "eins", "erste", "ersten"], icon: "🚩", tip: "日期序数词：第一天是 der <b>erste</b>。" },
            { a: "Wann hast du frei?", at: "你什么时候有空？", b: "_____ Wochenende.", bt: "周末有空。", ans: "Am", opts: ["Im", "Am", "Um", "An"], icon: "🏖️", tip: "周末固定搭配 <b>am</b>。" },
            { a: "Wie spät ist es?", at: "几点了？", b: "Zehn _____ sechs.", bt: "五点五十 (5:50)。", ans: "vor", opts: ["vor", "nach", "um", "an"], icon: "🏃", tip: "<b>vor</b> 表示差几分到某点。" },
            { a: "In welchem Monat?", at: "在哪个月？", b: "Ich reise _____ Juni.", bt: "我六月旅行。", ans: "im", opts: ["am", "im", "um", "an"], icon: "✈️", tip: "月份前固定用 <b>im</b>。" },
            { a: "Welcher Tag ist morgen?", at: "明天周几？", b: "Morgen ist _____.", bt: "明天周三。", ans: "Mittwoch", opts: ["Montag", "Dienstag", "Mittwoch", "Freitag"], icon: "📅", tip: "周三是 <b>Mittwoch</b>。" },
            { a: "Wann kommst du?", at: "你什么时候回来？", b: "Kurz _____ zwölf.", bt: "快到12点了。", ans: "vor", opts: ["vor", "nach", "um", "zu"], icon: "🏠", tip: "<b>kurz vor</b> 表示即将到某个时刻。" },
            { a: "Wann arbeitest du?", at: "你什么时候工作？", b: "_____ Vormittag.", bt: "在上午工作。", ans: "Am", opts: ["Am", "Im", "Um", "An"], icon: "💼", tip: "时间段（除夜晚）用 <b>am</b>。" },
            { a: "Wann ist die Party?", at: "派对几号？", b: "Am 21. _____.", bt: "在4月21日。", ans: "April", opts: ["April", "Aprils", "am April", "im April"], icon: "🥳", tip: "日期中的月份直接用原形。" },
            { a: "Wie spät ist es?", at: "几点钟了？", b: "Viertel _____ elf.", bt: "十点三刻 (10:45)。", ans: "vor", opts: ["nach", "vor", "auf", "in"], icon: "⌛", tip: "差一刻到11点用 <b>Viertel vor</b>。" },
            { a: "Wann schläfst du?", at: "你几点睡觉？", b: "In der _____.", bt: "在深夜睡觉。", ans: "Nacht", opts: ["Morgen", "Tag", "Nacht", "Abend"], icon: "🌙", tip: "特例：深夜用 <b>In der Nacht</b>。" },
            { a: "Wann ist Weihnachten?", at: "圣诞节在什么时候？", b: "_____ Dezember.", bt: "在十二月。", ans: "Im", opts: ["Am", "Im", "Um", "In"], icon: "🎄", tip: "月份固定搭配 <b>im</b>。" },
            { a: "Wann stehst du auf?", at: "你何时起床？", b: "_____ Morgen.", bt: "在清晨。", ans: "Am", opts: ["Am", "Im", "Um", "In"], icon: "🌅", tip: "早晨(Morgen)前用 <b>am</b>。" },
            { a: "Wann ist dein Termin?", at: "预约在几号？", b: "Am einundzwanzig_____.", bt: "在21号。", ans: "sten", opts: ["ten", "sten", "ste", "te"], icon: "📅", tip: "20之后的序数词在 am 后变为 <b>-sten</b>。" },
            { a: "Wann ist es Mittag?", at: "什么时候是正午？", b: "Um _____ Uhr.", bt: "在12点整。", ans: "zwölf", opts: ["zwölf", "zwanzig", "zwei", "zehn"], icon: "☀️", tip: "正午 12 点整的数字是 <b>zwölf</b>。" },
            { a: "Wann ist es dunkel?", at: "什么时候天黑？", b: "Um _____.", bt: "在午夜。", ans: "Mitternacht", opts: ["Mittag", "Abend", "Morgen", "Mitternacht"], icon: "🌌", tip: "午夜在德语里是 <b>Mitternacht</b>。" }
        ];

        let currentIndex = 0, isMuted = false, shuffledQuiz = [];
        const sndSuccess = document.getElementById('snd-success'), sndFail = document.getElementById('snd-fail');

        function initQuiz() {
            if (currentIndex === 0) shuffledQuiz = [...quizBank].sort(() => Math.random() - 0.5);
            if (currentIndex >= shuffledQuiz.length) { document.getElementById('win-layer').style.display = 'flex'; return; }

            const data = shuffledQuiz[currentIndex];
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) / shuffledQuiz.length * 100) + '%';
            document.getElementById('progress-num').innerText = `${currentIndex + 1} / ${shuffledQuiz.length}`;
            document.getElementById('main-emoji').innerText = data.icon;
            document.getElementById('q-a').innerText = data.a;
            document.getElementById('q-a-trans').innerText = data.at;
            document.getElementById('q-b').innerHTML = data.b.replace("_____", `<span id="gap-field" class="gap">?</span>`);
            document.getElementById('q-b-trans').innerText = data.bt;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            [...data.opts].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'opt-btn'; btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, data.ans, data.tip, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected, actual, tip, btn) {
            document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null);
            if (selected === actual) {
                if(!isMuted) sndSuccess.play();
                btn.classList.add('correct');
                document.getElementById('gap-field').innerText = selected;
                confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
                setTimeout(() => { currentIndex++; initQuiz(); }, 3000);
            } else {
                if(!isMuted) sndFail.play();
                btn.classList.add('wrong');
                setTimeout(() => { document.getElementById('tip-msg').innerHTML = tip; document.getElementById('tip-layer').style.display = 'flex'; }, 500);
            }
        }

        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊"; }
        function closeTip() {
            document.getElementById('tip-layer').style.display = 'none';
            const data = shuffledQuiz[currentIndex];
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.remove('wrong');
                b.onclick = () => checkAnswer(b.innerText, data.ans, data.tip, b);
            });
        }
        function finishLevel() { localStorage.setItem('level19_cleared', 'true'); location.href = 'index.html'; }
        initQuiz();
    </script>
</body>
</html>
