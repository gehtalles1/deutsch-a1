<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>词性翻翻乐 | 刘老师德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap');
        body { background: #F8FAFC; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; touch-action: none; }
        
        .card-stack { position: relative; width: 320px; height: 400px; z-index: 10; margin-bottom: 25px; }
        .card {
            position: absolute; width: 100%; height: 100%;
            background: white; border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #F1F5F9; cursor: grab; touch-action: none;
            z-index: 20;
        }
        
        /* 提升层级，确保文字永不消失 */
        #word { position: relative; z-index: 50 !important; font-size: 2.8rem; line-height: 1.2; margin-bottom: 0.8rem; color: #1e293b; font-weight: 900; }
        #mean { position: relative; z-index: 50 !important; font-size: 1.3rem; color: #94a3b8; font-weight: 700; }

        .guide-label {
            position: absolute; font-weight: 900; font-size: 1.6rem; opacity: 0.8;
            text-transform: lowercase; letter-spacing: 0.2em; pointer-events: none;
        }
        .label-der { top: 50%; left: -95px; transform: translateY(-50%) rotate(-90deg); color: #1e40af; } 
        .label-die { top: -85px; left: 50%; transform: translateX(-50%); color: #991b1b; } 
        .label-das { top: 50%; right: -95px; transform: translateY(-50%) rotate(90deg); color: #065f46; } 

        .play-hint { font-size: 0.8rem; color: #cbd5e1; font-weight: bold; letter-spacing: 0.05em; margin-top: 10px; }
        .mute-btn { transition: all 0.2s; opacity: 0.3; }
        .mute-btn.active { opacity: 1; color: #6366f1; }

        #tips-card { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; }
        #tips-card.show { transform: translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div class="fixed top-0 w-full max-w-[440px] p-8 flex justify-between items-center z-50">
        <button onclick="location.href='index.html'" class="text-slate-300"><svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg></button>
        <div class="flex items-center gap-3">
            <div class="text-[10px] font-black text-slate-400 tracking-widest uppercase">进度: <span id="cur-num">1</span> / 50</div>
            <button id="mute-toggle" class="mute-btn active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
        </div>
    </div>

    <div class="card-stack">
        <div class="guide-label label-der">← der</div>
        <div class="guide-label label-die">↑ die</div>
        <div class="guide-label label-das">das →</div>
        
        <div id="active-card" class="card">
            <div id="word">Bäckerei</div>
            <div id="mean">面包店</div>
        </div>
    </div>

    <div class="play-hint">
        ← 左滑 der / 上滑 die / 右滑 das →
    </div>

    <div id="tips-overlay" class="hidden fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[90]"></div>
    <div id="tips-card" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-10 z-[100] border-t-4 border-rose-100 max-w-[440px] mx-auto shadow-2xl">
        <h4 class="text-rose-500 font-black mb-2 text-xs uppercase tracking-widest">刘老师的锦囊</h4>
        <p id="tips-content" class="text-slate-500 font-bold mb-8 text-lg"></p>
        <button onclick="hideTip()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black">记住了</button>
    </div>

    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>

    <script>
        const rawWords = [
            {w:"Bäckerei", m:"面包店", a:"die", t:"-ei 结尾表示场所，100%是 die。"},
            {w:"Übung", m:"练习", a:"die", t:"-ung 结尾的名词，100%是 die。"},
            {w:"Freiheit", m:"自由", a:"die", t:"-heit 结尾的抽象名词全是 die。"},
            {w:"Station", m:"车站", a:"die", t:"-ion 结尾的外来语名词 100%是 die。"},
            {w:"Mannschaft", m:"团队", a:"die", t:"-schaft 结尾的名词全是 die。"},
            {w:"Universität", m:"大学", a:"die", t:"-tät 结尾的名词 100%是 die。"},
            {w:"Möglichkeit", m:"可能性", a:"die", t:"-keit 结尾的抽象名词全是 die。"},
            {w:"Garage", m:"车库", a:"die", t:"-age 结尾的外来语名词通常是 die。"},
            {w:"Kultur", m:"文化", a:"die", t:"-ur 结尾的名词大部分是 die。"},
            {w:"Toleranz", m:"宽容", a:"die", t:"-anz 结尾的抽象词全是 die。"},
            {w:"Optimismus", m:"乐观主义", a:"der", t:"-ismus 结尾的词 100%是 der。"},
            {w:"Honig", m:"蜂蜜", a:"der", t:"-ig 结尾的名词 100%是 der。"},
            {w:"Motor", m:"发动机", a:"der", t:"-or 结尾表示机器或人的词通常是 der。"},
            {w:"Mädchen", m:"女孩", a:"das", t:"-chen 结尾的小称词 100%是 das。"},
            {w:"Museum", m:"博物馆", a:"das", t:"-um 结尾的外来语名词通常是 das。"},
            {w:"Auto", m:"汽车", a:"das", t:"-o 结尾的外来语名词通常是 das。"},
            {w:"Instrument", m:"乐器", a:"das", t:"-ment 结尾的名词通常是 das。"},
            {w:"Frühling", m:"春天", a:"der", t:"所有季节、月份、星期都是 der。"},
            {w:"Essen", m:"食物", a:"das", t:"动词原型直接变名词，全是 das。"},
            {w:"Rentner", m:"退休者", a:"der", t:"-er 结尾表示男性的职业/身份是 der。"},
            {w:"Teppich", m:"地毯", a:"der", t:"-ich 结尾的名词通常是 der。"},
            {w:"Schmetterling", m:"蝴蝶", a:"der", t:"-ling 结尾的名词通常是 der。"},
            {w:"Tourist", m:"男游客", a:"der", t:"-ist 结尾表示人的职业/身份是 der。"},
            {w:"Regen", m:"雨", a:"der", t:"大部分天气现象（雨雪风霜）是 der。"},
            {w:"Kaffee", m:"咖啡", a:"der", t:"大部分饮料（除水/啤酒/牛奶）是 der。"},
            {w:"Techniker", m:"技术员", a:"der", t:"-er 结尾表示男性职业是 der。"},
            {w:"Juni", m:"六月", a:"der", t:"所有月份都是 der。"},
            {w:"Montag", m:"周一", a:"der", t:"所有星期天数都是 der。"},
            {w:"Computer", m:"电脑", a:"der", t:"-er 结尾的工具/机器通常是 der。"},
            {w:"Training", m:"训练", a:"das", t:"-ing 结尾的外来语通常是 das。"},
            {w:"Datum", m:"日期", a:"das", t:"-um 结尾，通常是 das。"},
            {w:"Kino", m:"电影院", a:"das", t:"-o 结尾的外来语场所通常是 das。"},
            {w:"Handy", m:"手机", a:"das", t:"外来语科技产品通常是 das。"},
            {w:"Wochenende", m:"周末", a:"das", t:"复合词看词尾：das Ende。"},
            {w:"Ergebnis", m:"结果", a:"das", t:"-nis 结尾的名词大部分是 das。"},
            {w:"Formular", m:"表格", a:"das", t:"-ar 结尾的物件通常是 das。"},
            {w:"Interesse", m:"兴趣", a:"das", t:"特殊词：以 -e 结尾但是中性。"},
            {w:"Konferenz", m:"会议", a:"die", t:"-enz 结尾的名词通常是 die。"},
            {w:"Musik", m:"音乐", a:"die", t:"-ik 结尾的名词大部分是 die。"},
            {w:"Natur", m:"自然", a:"die", t:"-ur 结尾，通常是 die。"},
            {w:"Küche", m:"厨房", a:"die", t:"以 -e 结尾的非生物名词 90%是 die。"},
            {w:"Lampe", m:"灯", a:"die", t:"-e 结尾，通常是 die。"},
            {w:"Reise", m:"旅行", a:"die", t:"-e 结尾，通常是 die。"},
            {w:"Zertifikat", m:"证书", a:"das", t:"-at 结尾的外来语通常是 das。"},
            {w:"Büro", m:"办公室", a:"das", t:"-o 结尾，外来语，通常是 das。"},
            {w:"Hotel", m:"酒店", a:"das", t:"许多外来语建筑词是 das。"},
            {w:"Hähnchen", m:"小鸡", a:"das", t:"-chen 结尾，必选 das。"},
            {w:"Apfelsaft", m:"苹果汁", a:"der", t:"复合词词性看词尾：der Saft。"},
            {w:"Kuchen", m:"蛋糕", a:"der", t:"注意：这个 -en 结尾的面点是 der。"},
            {w:"Pfeffer", m:"胡椒", a:"der", t:"-er 结尾的调料名通常是 der。"}
        ];

        // 随机洗牌数据
        const words = rawWords.sort(() => Math.random() - 0.5);
        let score = 0, currentIdx = 0, isMuted = false;
        
        const card = document.getElementById('active-card');
        const wordEl = document.getElementById('word');
        const meanEl = document.getElementById('mean');
        const sndOk = document.getElementById('snd-ok');
        const muteBtn = document.getElementById('mute-toggle');

        function updateCard() {
            if (!words[currentIdx]) return;
            wordEl.innerText = words[currentIdx].w;
            meanEl.innerText = words[currentIdx].m;
            document.getElementById('cur-num').innerText = score + 1;
            card.style.transition = 'none';
            card.style.transform = 'translate(0,0) rotate(0)';
            card.style.opacity = '1';
        }

        muteBtn.onclick = () => {
            isMuted = !isMuted;
            muteBtn.classList.toggle('active', !isMuted);
        };

        const mc = new Hammer(card);
        mc.on("panmove", (e) => {
            card.style.transition = 'none';
            card.style.transform = `translate(${e.deltaX}px, ${e.deltaY}px) rotate(${e.deltaX/20}deg)`;
        });

        mc.on("panend", (e) => {
            let answer = '';
            if (e.deltaX < -80) answer = 'der';
            else if (e.deltaY < -80) answer = 'die';
            else if (e.deltaX > 80) answer = 'das';

            if (answer) {
                if (answer === words[currentIdx].a) {
                    if (!isMuted) { sndOk.currentTime = 0; sndOk.play().catch(()=>{}); }
                    card.style.transition = 'all 0.3s ease-out';
                    card.style.transform += ' scale(0.5) opacity(0)';
                    setTimeout(() => {
                        score++;
                        if (score >= 50) {
                            localStorage.setItem('stage2_score', 'gold');
                            alert("通关！🥇");
                            location.href = 'index.html';
                        } else {
                            currentIdx++;
                            updateCard();
                        }
                    }, 200);
                } else {
                    card.style.transition = 'transform 0.4s';
                    card.style.transform = 'translate(0,0) rotate(0)';
                    showTip(words[currentIdx].t);
                }
            } else {
                card.style.transition = 'transform 0.3s';
                card.style.transform = 'translate(0,0) rotate(0)';
            }
        });

        function showTip(text) {
            document.getElementById('tips-content').innerText = text;
            document.getElementById('tips-overlay').classList.remove('hidden');
            document.getElementById('tips-card').classList.add('show');
        }

        function hideTip() {
            document.getElementById('tips-overlay').classList.add('hidden');
            document.getElementById('tips-card').classList.remove('show');
        }

        // 🚨 初始化逻辑：页面一准备好就执行刷新
        document.addEventListener('DOMContentLoaded', () => {
            updateCard();
            // 额外加个小延迟防止部分浏览器渲染滞后
            setTimeout(updateCard, 100);
        });
    </script>
</body>
</html>
