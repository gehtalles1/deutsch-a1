<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>词性规律一眼识破 | 刘老师德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        
        body { 
            background: #F8FAFC; font-family: 'Noto Sans SC', sans-serif; 
            margin: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column;
            height: 100vh; height: -webkit-fill-available;
        }

        .header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-top: 10px; flex-shrink: 0; }
        .main-game { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .footer { height: 80px; display: flex; align-items: center; justify-content: center; padding-bottom: 20px; flex-shrink: 0; }

        /* 关键修改：缩小卡片容器，腾出侧边空间 */
        .card-stack { position: relative; width: 75vw; max-width: 300px; height: 380px; z-index: 10; }
        
        .card {
            position: absolute; width: 100%; height: 100%;
            background: white; border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #F1F5F9; cursor: grab; z-index: 20;
        }
        
        #word { font-size: 2.8rem; font-weight: 900; color: #0f172a; margin-bottom: 8px; }
        #mean { font-size: 1.3rem; color: #64748b; font-weight: 700; }

        /* 标签：加大、加深颜色、增加箭头指示 */
        .guide-label {
            position: absolute; font-weight: 900; font-size: 1.5rem; 
            opacity: 0.8; pointer-events: none; transition: all 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        /* 左侧 der - 蓝色 */
        .label-der { left: -75px; top: 50%; transform: translateY(-50%) rotate(-90deg); color: #2563eb; } 
        /* 上侧 die - 红色 */
        .label-die { top: -75px; left: 50%; transform: translateX(-50%); color: #dc2626; flex-direction: column; } 
        /* 右侧 das - 绿色 */
        .label-das { right: -75px; top: 50%; transform: translateY(-50%) rotate(90deg); color: #16a34a; } 

        .play-hint { font-size: 0.8rem; color: #94a3b8; font-weight: 900; letter-spacing: 0.05em; opacity: 0.6; }

        #tips-card { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; }
        #tips-card.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="location.href='index.html'" class="text-slate-300 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <div class="flex items-center gap-3">
            <div class="bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-100">
                <span class="text-[10px] font-black text-slate-400 uppercase">进度</span>
                <span id="cur-num" class="text-sm font-black text-rose-500 ml-1">1</span>
                <span class="text-[10px] font-black text-slate-300"> / 50</span>
            </div>
            <button id="mute-toggle" class="p-2 text-slate-300 active:text-indigo-500">
                <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
        </div>
    </div>

    <div class="main-game">
        <div id="feedback-tag" class="absolute top-10 text-5xl font-black opacity-0 transition-opacity uppercase z-50"></div>

        <div class="card-stack">
            <div class="guide-label label-der"><span>←</span> der</div>
            <div class="guide-label label-die"><span>↑</span> die</div>
            <div class="guide-label label-das">das <span>→</span></div>
            
            <div id="active-card" class="card">
                <div id="word">Teppich</div>
                <div id="mean">地毯</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="play-hint">
            ← der | die ↑ | das →
        </div>
    </div>

    <div id="tips-overlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90]"></div>
    <div id="tips-card" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-8 pb-10 z-[100] border-t-4 border-rose-200 mx-auto max-w-md">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
        <h4 class="text-rose-500 font-black mb-2 text-xs uppercase tracking-widest text-center">刘老师的锦囊</h4>
        <p id="tips-content" class="text-slate-800 font-bold mb-10 text-xl text-center leading-relaxed px-4"></p>
        <button onclick="hideTip()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg active:scale-95 transition-transform">记住了</button>
    </div>

    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    <audio id="snd-err" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <script>
        // 50个词汇数据 (保持不变)
        const rawWords = [
            {w:"Bäckerei", m:"面包店", a:"die", t:"-ei 结尾表示场所，100%是 die。"},
            {w:"Übung", m:"练习", a:"die", t:"-ung 结尾的名词，100%是 die。"},
            {w:"Freiheit", m:"自由", a:"die", t:"-heit 结尾的抽象名词全是 die。"},
            {w:"Station", m:"车站", a:"die", t:"-ion 结尾的外来语名词 100%是 die。"},
            {w:"Mannschaft", m:"团队", a:"die", t:"-schaft 结尾的名词全是 die。"},
            {w:"Universität", m:"大学", a:"die", t:"-tät 结尾的名词 100%是 die。"},
            {w:"Möglichkeit", m:"可能性", a:"die", t:"-keit 结尾的抽象名词全是 die。"},
            {w:"Garage", m:"车库", a:"die", t:"-age 结尾的外来语名词通常是 die。"},
            {w:"Kultur", m:"文化", a:"die", t:"-ur 结尾的名词大部分是 die。"},
            {w:"Toleranz", m:"宽容", a:"die", t:"-anz 结尾的抽象词全是 die。"},
            {w:"Optimismus", m:"乐观主义", a:"der", t:"-ismus 结尾的词 100%是 der。"},
            {w:"Honig", m:"蜂蜜", a:"der", t:"-ig 结尾的名词 100%是 der。"},
            {w:"Motor", m:"发动机", a:"der", t:"-or 结尾表示机器或人的词通常是 der。"},
            {w:"Mädchen", m:"女孩", a:"das", t:"-chen 结尾的小称词 100%是 das。"},
            {w:"Museum", m:"博物馆", a:"das", t:"-um 结尾的外来语名词通常是 das。"},
            {w:"Auto", m:"汽车", a:"das", t:"-o 结尾的外来语名词通常是 das。"},
            {w:"Instrument", m:"乐器", a:"das", t:"-ment 结尾的名词通常是 das。"},
            {w:"Frühling", m:"春天", a:"der", t:"所有季节、月份、星期都是 der。"},
            {w:"Essen", m:"食物", a:"das", t:"动词原型直接变名词，全是 das。"},
            {w:"Rentner", m:"退休者", a:"der", t:"-er 结尾表示男性的职业/身份是 der。"},
            {w:"Teppich", m:"地毯", a:"der", t:"-ich 结尾的名词通常是 der。"},
            {w:"Schmetterling", m:"蝴蝶", a:"der", t:"-ling 结尾的名词通常是 der。"},
            {w:"Tourist", m:"男游客", a:"der", t:"-ist 结尾表示人的职业/身份是 der。"},
            {w:"Regen", m:"雨", a:"der", t:"大部分天气现象（雨雪风霜）是 der。"},
            {w:"Kaffee", m:"咖啡", a:"der", t:"大部分饮料（除水/啤酒/牛奶）是 der。"},
            {w:"Techniker", m:"技术员", a:"der", t:"-er 结尾表示男性职业是 der。"},
            {w:"Juni", m:"六月", a:"der", t:"所有月份都是 der。"},
            {w:"Montag", m:"周一", a:"der", t:"所有星期天数都是 der。"},
            {w:"Computer", m:"电脑", a:"der", t:"-er 结尾的工具/机器通常是 der。"},
            {w:"Training", m:"训练", a:"das", t:"-ing 结尾的外来语通常是 das。"},
            {w:"Datum", m:"日期", a:"das", t:"-um 结尾，通常是 das。"},
            {w:"Kino", m:"电影院", a:"das", t:"-o 结尾的外来语场所通常是 das。"},
            {w:"Handy", m:"手机", a:"das", t:"外来语科技产品通常是 das。"},
            {w:"Wochenende", m:"周末", a:"das", t:"复合词看词尾：das Ende。"},
            {w:"Ergebnis", m:"结果", a:"das", t:"-nis 结尾的名词大部分是 das。"},
            {w:"Formular", m:"表格", a:"das", t:"-ar 结尾的物件通常是 das。"},
            {w:"Interesse", m:"兴趣", a:"das", t:"特殊词：以 -e 结尾但是中性。"},
            {w:"Konferenz", m:"会议", a:"die", t:"-enz 结尾的名词通常是 die。"},
            {w:"Musik", m:"音乐", a:"die", t:"-ik 结尾的名词大部分是 die。"},
            {w:"Natur", m:"自然", a:"die", t:"-ur 结尾，通常是 die。"},
            {w:"Küche", m:"厨房", a:"die", t:"以 -e 结尾的非生物名词 90%是 die。"},
            {w:"Lampe", m:"灯", a:"die", t:"-e 结尾，通常是 die。"},
            {w:"Reise", m:"旅行", a:"die", t:"-e 结尾，通常是 die。"},
            {w:"Zertifikat", m:"证书", a:"das", t:"-at 结尾的外来语通常是 das。"},
            {w:"Büro", m:"办公室", a:"das", t:"-o 结尾，外来语，通常是 das。"},
            {w:"Hotel", m:"酒店", a:"das", t:"许多外来语建筑词是 das。"},
            {w:"Hähnchen", m:"小鸡", a:"das", t:"-chen 结尾，必选 das。"},
            {w:"Apfelsaft", m:"苹果汁", a:"der", t:"复合词词性看词尾：der Saft。"},
            {w:"Kuchen", m:"蛋糕", a:"der", t:"注意：这个 -en 结尾的面点是 der。"},
            {w:"Pfeffer", m:"胡椒", a:"der", t:"-er 结尾的调料名通常是 der。"}
        ];

        const words = rawWords.sort(() => Math.random() - 0.5);
        let currentIdx = 0, isMuted = false;

        const card = document.getElementById('active-card');
        const feedbackTag = document.getElementById('feedback-tag');
        const sndOk = document.getElementById('snd-ok');
        const sndErr = document.getElementById('snd-err');

        function updateCard() {
            if (currentIdx >= words.length) return;
            document.getElementById('word').innerText = words[currentIdx].w;
            document.getElementById('mean').innerText = words[currentIdx].m;
            document.getElementById('cur-num').innerText = currentIdx + 1;
            card.style.transition = 'none';
            card.style.transform = 'translate(0,0) rotate(0)';
            card.style.opacity = '1';
        }

        const mc = new Hammer(card);
        mc.get('pan').set({ direction: Hammer.DIRECTION_ALL });

        mc.on("panmove", (e) => {
            card.style.transition = 'none';
            card.style.transform = `translate(${e.deltaX}px, ${e.deltaY}px) rotate(${e.deltaX/20}deg)`;
            
            if (e.deltaY < -60) { showFeedback('die', '#dc2626'); }
            else if (e.deltaX < -60) { showFeedback('der', '#2563eb'); }
            else if (e.deltaX > 60) { showFeedback('das', '#16a34a'); }
            else { feedbackTag.style.opacity = '0'; }
        });

        function showFeedback(text, color) {
            feedbackTag.innerText = text;
            feedbackTag.style.color = color;
            feedbackTag.style.opacity = '0.8';
        }

        mc.on("panend", (e) => {
            feedbackTag.style.opacity = '0';
            let answer = '';
            if (e.deltaX < -80) answer = 'der';
            else if (e.deltaY < -80) answer = 'die';
            else if (e.deltaX > 80) answer = 'das';

            if (answer) {
                if (answer === words[currentIdx].a) {
                    if(!isMuted) sndOk.play().catch(()=>{});
                    card.style.transition = 'all 0.3s ease-out';
                    card.style.opacity = '0';
                    card.style.transform += ' scale(0.7)';
                    setTimeout(() => {
                        currentIdx++;
                        if (currentIdx >= 50) {
                            alert("通关啦！");
                            location.href = 'index.html';
                        } else { updateCard(); }
                    }, 200);
                } else {
                    // 答错反馈：声音 + 震动
                    if(!isMuted) sndErr.play().catch(()=>{});
                    if (window.navigator.vibrate) window.navigator.vibrate(150); 
                    
                    card.style.transition = 'transform 0.4s';
                    card.style.transform = 'translate(0,0) rotate(0)';
                    showTip(words[currentIdx].t);
                }
            } else {
                card.style.transition = 'transform 0.3s';
                card.style.transform = 'translate(0,0) rotate(0)';
            }
        });

        function showTip(text) {
            document.getElementById('tips-content').innerText = text;
            document.getElementById('tips-overlay').classList.remove('hidden');
            document.getElementById('tips-card').classList.add('show');
        }

        function hideTip() {
            document.getElementById('tips-overlay').classList.add('hidden');
            document.getElementById('tips-card').classList.remove('show');
        }

        document.getElementById('mute-toggle').onclick = function() {
            isMuted = !isMuted;
            this.classList.toggle('text-indigo-500', !isMuted);
        }

        window.onload = updateCard;
    </script>
</body>
</html>
