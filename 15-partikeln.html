<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>15-跨越小品词 | A1 语气强化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        
        body { 
            background: #F8FAFC; 
            font-family: 'Noto Sans SC', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        .app-container { 
            width: 100%; 
            max-width: 600px; 
            height: 100vh; /* 适配移动端全屏 */
            background: #FFFFFF; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            /* 适配 iOS 安全区域 */
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 针对桌面端的圆角装饰 */
        @media (min-height: 800px) and (min-width: 600px) {
            .app-container {
                height: 95vh;
                max-height: 850px;
                border-radius: 40px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.1);
                border: 8px solid white;
            }
        }

        .header-nav { padding: 20px 20px 10px; display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .back-btn, .mute-btn { background: #F1F5F9; padding: 10px; border-radius: 15px; color: #64748B; cursor: pointer; display: flex; align-items: center; }
        
        .progress-container { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .progress-info { font-size: 13px; font-weight: 900; color: #94A3B8; text-align: center; }
        .progress-bar-bg { width: 100%; height: 8px; background: #E2E8F0; border-radius: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #F59E0B, #FB923C); transition: width 0.4s; }

        .main-stage { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px 25px; 
            min-height: 0; /* 允许在空间不足时收缩 */
        }

        .mood-card { 
            width: 100%; 
            padding: 30px 20px; 
            background: #FFFBF0; 
            border-radius: 30px; 
            text-align: center; 
            border: 2px solid #FEF3C7;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .mood-emoji { font-size: 60px; margin-bottom: 10px; animation: floatEmoji 2.5s infinite ease-in-out; }
        
        .sentence-area { font-size: 1.4rem; font-weight: 800; color: #451A03; line-height: 1.3; margin-bottom: 8px; }
        .translation-area { font-size: 1rem; font-weight: 700; color: #B45309; opacity: 0.8; }
        
        .drop-zone { display: inline-block; min-width: 50px; border-bottom: 3px solid #F59E0B; margin: 0 4px; color: transparent; }
        .drop-zone.filled { color: #10B981; border-bottom-color: #10B981; }

        .options-area { 
            padding: 15px 20px 30px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            flex-shrink: 0; /* 确保按钮区域不被压缩 */
        }

        .option-btn { 
            background: #F59E0B; 
            border: 2px solid #D97706; 
            padding: 15px 0; 
            border-radius: 20px; 
            font-size: 1.2rem; 
            font-weight: 900; 
            color: white; 
            box-shadow: 0 5px 0 #92400E; 
            transition: 0.1s; 
        }

        .option-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #92400E; }

        #teacher-tip { 
            position: absolute; 
            bottom: -100%; left: 0; right: 0; 
            background: white; 
            padding: 30px 25px calc(30px + env(safe-area-inset-bottom)); 
            border-radius: 35px 35px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
            transition: 0.4s ease-out; 
            z-index: 100; 
            border-top: 5px solid #F59E0B; 
        }
        #teacher-tip.active { bottom: 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-nav">
            <button onclick="window.location.href='index.html'" class="back-btn"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg></button>
            <div class="progress-container">
                <div class="progress-info"><span id="cur-num">1</span> / 30</div>

            <button onclick="toggleMute()" class="mute-btn"><svg id="mute-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg></button>
        </div>
        
        <div class="main-stage">
            <div class="mood-card">
                <span class="mood-emoji" id="mood-emoji">😊</span>
                <div class="sentence-area" id="sentence-box"></div>
                <div class="translation-area" id="translation-box"></div>

        </div>

        <div class="options-area" id="options-grid"></div>

        <div id="teacher-tip">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center text-xl">👩‍🏫</div>
                <h3 class="text-md font-black text-amber-900">语气解析</h3>
            </div>
            <div id="tip-text" class="text-slate-700 font-bold mb-6 text-sm bg-amber-50 p-4 rounded-xl border-l-4 border-amber-500"></div>
            <button onclick="closeTip()" class="w-full py-4 bg-amber-600 text-white rounded-xl font-black text-lg">记住了</button>
        </div>
    </div>
