<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>15-跨越小品词 | A1 语气强化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        body { background: #F8FAFC; font-family: 'Noto Sans SC', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .app-container { width: 100%; max-width: 600px; height: 95vh; max-height: 850px; background: #FFFFFF; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; display: flex; flex-direction: column; overflow: hidden; border: 8px solid white; }
        .header-nav { padding: 25px 25px 15px; display: flex; align-items: center; gap: 15px; }
        .back-btn, .mute-btn { background: #F1F5F9; padding: 12px; border-radius: 18px; color: #64748B; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .progress-container { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .progress-info { font-size: 14px; font-weight: 900; color: #94A3B8; text-align: center; }
        .progress-bar-bg { width: 100%; height: 10px; background: #E2E8F0; border-radius: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #F59E0B, #FB923C); transition: width 0.4s ease-out; }
        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 30px; }
        .mood-card { width: 100%; padding: 40px 20px; background: #FFFBF0; border-radius: 35px; text-align: center; border: 2px solid #FEF3C7; }
        @keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .mood-emoji { font-size: 80px; margin-bottom: 15px; display: inline-block; animation: floatEmoji 2.5s infinite ease-in-out; }
        .sentence-area { font-size: 1.6rem; font-weight: 800; color: #451A03; line-height: 1.4; margin-bottom: 10px; }
        .translation-area { font-size: 1.1rem; font-weight: 700; color: #B45309; opacity: 0.8; min-height: 1.5em; }
        .drop-zone { display: inline-block; min-width: 60px; border-bottom: 4px solid #F59E0B; margin: 0 5px; color: transparent; vertical-align: baseline; }
        .drop-zone.filled { color: #10B981; border-bottom-color: #10B981; }
        .options-area { padding: 20px 25px 40px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .option-btn { background: #F59E0B; border: 2px solid #D97706; padding: 18px 0; border-radius: 22px; font-size: 1.4rem; font-weight: 900; color: white; box-shadow: 0 6px 0 #92400E; transition: 0.1s; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #92400E; }
        #teacher-tip { position: absolute; bottom: -100%; left: 0; right: 0; background: white; padding: 35px; border-radius: 40px 40px 0 0; box-shadow: 0 -15px 50px rgba(0,0,0,0.1); transition: 0.5s; z-index: 100; border-top: 6px solid #F59E0B; }
        #teacher-tip.active { bottom: 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-nav">
            <button onclick="window.location.href='index.html'" class="back-btn"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg></button>
            <div class="progress-container">
                <div class="progress-info"><span id="cur-num">1</span> / 30</div>
                <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            </div>
            <button onclick="toggleMute()" class="mute-btn"><svg id="mute-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg></button>
        </div>
        <div class="main-stage">
            <div class="mood-card">
                <span class="mood-emoji" id="mood-emoji">😊</span>
                <div class="sentence-area" id="sentence-box"></div>
                <div class="translation-area" id="translation-box"></div>
            </div>
        </div>
        <div class="options-area" id="options-grid"></div>
        <div id="teacher-tip">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center text-2xl">👩‍🏫</div>
                <h3 class="text-lg font-black text-amber-900">语气解析</h3>
            </div>
            <div id="tip-text" class="text-slate-700 font-bold mb-6 text-md bg-amber-50 p-5 rounded-xl border-l-4 border-amber-500"></div>
            <button onclick="closeTip()" class="w-full py-4 bg-amber-600 text-white rounded-xl font-black text-lg">记住了</button>
        </div>
    </div>

    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-err" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        const rawData = [
            { s: "Komm ____ her!", a: "mal", e: "🏃", cn: "过来一下呗！", t: "mal 使命令语气变温和，相当于中文的‘……一下呗’。" },
            { s: "Helfen Sie mir ____?", a: "mal", e: "🙏", cn: "能帮我个忙吗？", t: "mal 让求助听起来更客气、随意，没有强迫感。" },
            { s: "Warten Sie ____!", a: "mal", e: "⏳", cn: "请等一下哦！", t: "mal 缩短了心理距离，让对方觉得等待不那么枯燥。" },
            { s: "Schau ____ das Foto!", a: "mal", e: "📸", cn: "快看一眼这照片！", t: "mal 用于吸引对方注意力，语气非常轻松。" },
            { s: "Hör ____ Musik!", a: "mal", e: "🎧", cn: "听点音乐呗！", t: "mal 用于给出随意的建议，表示‘试着做某事’。" },
            { s: "Frag ____ den Lehrer!", a: "mal", e: "👨‍🏫", cn: "去问问老师看嘛！", t: "mal 降低了建议的严肃性，相当于中文的‘……看看’。" },
            { s: "Trink ____ einen Kaffee!", a: "mal", e: "☕", cn: "喝杯咖啡休息下呗！", t: "mal 让邀请显得亲切且顺便，不给对方压力。" },
            { s: "Probier ____ das Brot!", a: "mal", e: "🥖", cn: "尝一下这个面包吧！", t: "mal 鼓励尝试，语气非常友好。" },
            { s: "Zeig mir ____ den Weg.", a: "mal", e: "🗺️", cn: "给我指下路呗。", t: "mal 柔化了寻求帮助的语气，显得有礼貌。" },
            { s: "Sag ____, wie viel Uhr ist es?", a: "mal", e: "⌚", cn: "嘿说一下，几点啦？", t: "Sag mal 是固定的开场白，类似‘哎，请问’。" },
            { s: "Wie heißt du ____?", a: "denn", e: "🧐", cn: "你到底叫什么呀？", t: "denn 在疑问句中体现出说话人强烈的好奇心。" },
            { s: "Woher kommst du ____?", a: "denn", e: "🌍", cn: "那你到底是哪国人呀？", t: "denn 表现出对对方背景真诚的、自然的关注。" },
            { s: "Was machst du ____ hier?", a: "denn", e: "😲", cn: "你究竟在这儿干嘛呢？", t: "denn 表达看到意料之外情况时的惊讶。" },
            { s: "Wie alt bist du ____?", a: "denn", e: "🎂", cn: "那你到底几岁了呀？", t: "denn 顺着话题自然追问，显得更有温度。" },
            { s: "Wo ist ____ mein Handy?", a: "denn", e: "📱", cn: "我的手机究竟在哪儿啊？", t: "denn 表达找不到东西时的焦虑或纳闷。" },
            { s: "Komm ____ rein!", a: "doch", e: "🏠", cn: "快进来嘛！", t: "doch 消除对方的拘束感，表示热情的邀请。" },
            { s: "Essen Sie ____!", a: "doch", e: "🍕", cn: "快吃嘛，别客气！", t: "doch 表现主人的慷慨和真诚建议。" },
            { s: "Das ist ____ falsch!", a: "doch", e: "❌", cn: "这明明是错的呀！", t: "doch 用于反驳或纠正，带有‘事实本就如此’的强调。" },
            { s: "Geh ____ nach Hause!", a: "doch", e: "🚶", cn: "你还是快回家吧！", t: "doch 给出迫切的建议，暗示这是显而易见的决定。" },
            { s: "Nimm ____ ein Taxi!", a: "doch", e: "🚕", cn: "那你坐出租车嘛！", t: "doch 指出一个显而易见的解决办法。" },
            { s: "Das ist ____ billig!", a: "ja", e: "🏷️", cn: "这可真是便宜呀！", t: "ja 表示感叹，强调自己对眼前情况的惊讶。" },
            { s: "Du bist ____ müde!", a: "ja", e: "🥱", cn: "你确实很累了呀。", t: "ja 用于确认一个显而易见、双方公认的事实。" },
            { s: "Heute ist ____ Sonntag!", a: "ja", e: "🗓️", cn: "今天可是周日呀！", t: "ja 提醒对方一个被忽略的基本常识。" },
            { s: "Das geht ____.", a: "schon", e: "👌", cn: "那倒也行。", t: "schon 表示一种基本的满意、认可或勉强的接受。" },
            { s: "Ich komme ____!", a: "schon", e: "🏃‍♂️", cn: "我这就来了！", t: "schon 强调动作正在进行，用来回应对方的催促。" },
            { s: "Wir finden das ____.", a: "schon", e: "🔎", cn: "我们总能找到的嘛。", t: "schon 用于宽慰，表达对结果的信心。" },
            { s: "Wo wohnst du ____?", a: "denn", e: "🏘️", cn: "那你到底是住在哪儿呢？", t: "denn 让提问显得更亲切，更像朋友间的闲聊。" },
            { s: "Lies ____ den Text!", a: "mal", e: "📖", cn: "读一下这段话吧！", t: "mal 语气轻松，常用于课堂或日常指令的柔化。" },
            { s: "Das ist ____ super!", a: "ja", e: "✨", cn: "这可真是太棒了！", t: "ja 表达由衷的赞叹，带有发现惊喜的意味。" },
            { s: "Frag ____ die Frau!", a: "mal", e: "👩", cn: "去问一下那位女士呗！", t: "mal 减轻压力，让提议听起来非常随意。" }
        ];

        let quizData = [...rawData].sort(() => Math.random() - 0.5);
        let currentIndex = 0; let isMuted = false; let canClick = true;

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-icon').innerHTML = isMuted ? 
                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />' : 
                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />';
        }

        function playSound(type) {
            if (isMuted) return;
            const s = document.getElementById(type === 'ok' ? 'snd-ok' : 'snd-err');
            s.currentTime = 0; s.play().catch(()=>{});
        }

        function renderQuestion() {
            if (currentIndex >= quizData.length) { 
                localStorage.setItem('level15_cleared', 'true');
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                setTimeout(() => window.location.href='index.html', 3000);
                return; 
            }
            canClick = true;
            const data = quizData[currentIndex];
            document.getElementById('mood-emoji').innerText = data.e;
            document.getElementById('sentence-box').innerHTML = data.s.replace("____", `<span class="drop-zone">____</span>`);
            document.getElementById('translation-box').innerText = data.cn;
            document.getElementById('cur-num').innerText = currentIndex + 1;
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) / quizData.length * 100) + '%';
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            const pool = ["denn", "doch", "ja", "mal", "schon"];
            let options = [data.a];
            let others = pool.filter(p => p !== data.a).sort(() => Math.random() - 0.5);
            options.push(...others.slice(0, 3));
            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(!canClick) return;
                    if(opt === data.a) {
                        canClick = false; playSound('ok');
                        const dz = document.querySelector('.drop-zone');
                        dz.innerText = opt; dz.classList.add('filled');
                        setTimeout(() => { currentIndex++; renderQuestion(); }, 3000);
                    } else {
                        playSound('err');
                        document.getElementById('tip-text').innerText = data.t;
                        document.getElementById('teacher-tip').classList.add('active');
                        canClick = false;
                    }
                };
                grid.appendChild(btn);
            });
        }

        function closeTip() { document.getElementById('teacher-tip').classList.remove('active'); canClick = true; }
        renderQuestion();
    </script>
</body>
</html>
