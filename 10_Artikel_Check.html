<!DOCTYPE html>
<html lang="zh-CN" style="height: 100%; overflow: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>德语1/4格冠词全能训练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        body { background: #F0F4F9; font-family: 'Noto Sans SC', sans-serif; margin: 0; width: 100vw; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header-bar { width: 100%; max-width: 430px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 25px 24px 10px; }
        .progress-rail { flex-grow: 1; margin: 0 15px; height: 8px; background: #D1D9E6; border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: #3B82F6; transition: width 0.6s ease; }
        .control-icon { width: 32px; height: 32px; color: #94A3B8; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .content-area { width: 100%; max-width: 430px; flex-grow: 1; display: flex; flex-direction: column; margin: 0 auto; padding: 10px 24px 40px; justify-content: space-between; }
        #card-body { width: 100%; background: #FFFFFF; border-radius: 50px; box-shadow: 0 12px 30px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; margin-bottom: 20px; }
        .sentence-text { font-size: 1.4rem; font-weight: 700; text-align: center; line-height: 1.6; color: #1E293B; min-height: 60px; }
        .slot { display: inline-block; min-width: 60px; border-bottom: 4px solid #3B82F6; color: #3B82F6; margin: 0 6px; padding: 0 4px; transition: 0.3s; }
        .slot.correct { color: #10B981; border-bottom-color: #10B981; }
        /* 调整为3列布局以容纳更多选项 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
        .option-box { height: 60px; background: #1E293B; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .option-box span { font-size: 1.1rem; font-weight: 800; color: #FFFFFF; }
        .option-box.active { background: #3B82F6; }
        .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div onclick="location.href='index.html'" class="control-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="progress-rail"><div id="progress-fill"></div></div>
        <div id="mute-trigger" onclick="toggleAudio()" class="control-icon"><svg id="audio-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div>
    </div>

    <div class="text-center font-bold text-slate-400 mt-2 mb-2" id="step-label">1 / 30</div>

    <div class="content-area">
        <div id="card-body">
            <div id="img-icon" class="text-7xl mb-6"></div>
            <div id="txt-display" class="sentence-text"></div>
        </div>
        <div class="btn-grid" id="opt-container"></div>
    </div>

    <div id="feedback-modal" class="modal-wrap">
        <div class="bg-white rounded-[40px] p-8 w-[320px] text-center shadow-2xl">
            <div class="text-5xl mb-4">💡 语法提醒</div>
            <p id="tip-text" class="text-slate-600 mb-8 text-sm text-left bg-blue-50 p-5 rounded-3xl leading-relaxed"></p>
            <button onclick="closePop()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-lg">记住了</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioMuted = false;
        function playDing(isCorrect) {
            if(audioMuted) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if(isCorrect) { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); }
            else { osc.type = 'square'; osc.frequency.setValueAtTime(110, now); gain.gain.setValueAtTime(0.1, now); }
            osc.start(); osc.stop(now + 0.4);
        }

        function toggleAudio() { 
            audioMuted = !audioMuted;
            document.getElementById('audio-svg').innerHTML = audioMuted ? `<path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/>` : `<path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
        }

        const data = [
            // --- 阳性 Maskulin (der/ein/den/einen) ---
            {q: "Ich sehe [?] Mann dort.", a: "den", i: "👀", t: "Akk., 阳性特指: den"},
            {q: "Er braucht [?] Kuli.", a: "einen", i: "🖊️", t: "Akk., 阳性泛指: einen"},
            {q: "Wo ist [?] Bus?", a: "der", i: "🚌", t: "Nom., 阳性特指: der"},
            {q: "Hast du [?] Euro?", a: "einen", i: "💶", t: "Akk., 阳性泛指: einen"},
            {q: "Ich trinke [?] Saft.", a: "den", i: "🍹", t: "Akk., 阳性特指: den"},
            {q: "Das ist [?] Hund.", a: "ein", i: "🐕", t: "Nom., 阳性泛指: ein"},
            
            // --- 中性 Neutrum (das/ein/das/ein) ---
            {q: "Ich lese [?] Buch.", a: "ein", i: "📖", t: "Akk., 中性泛指: ein (中性1/4格同形)"},
            {q: "[?] Kind spielt im Garten.", a: "Das", i: "👶", t: "Nom., 中性特指: Das"},
            {q: "Siehst du [?] Haus dort?", a: "das", i: "🏠", t: "Akk., 中性特指: das"},
            {q: "Das ist [?] Auto von Tim.", a: "das", i: "🚗", t: "Nom., 中性特指: das"},
            {q: "Ich möchte [?] Eis essen.", a: "ein", i: "🍦", t: "Akk., 中性泛指: ein"},
            {q: "[?] Mädchen lernt Deutsch.", a: "Das", i: "👧", t: "Nom., 中性特指: Das"},
            {q: "Kaufst du [?] Brot?", a: "ein", i: "🍞", t: "Akk., 中性泛指: ein"},
            {q: "Hier ist [?] Bild.", a: "ein", i: "🖼️", t: "Nom., 中性泛指: ein"},
            
            // --- 阴性 Feminin (die/eine/die/eine) ---
            {q: "Ich kenne [?] Frau.", a: "die", i: "👩", t: "Akk., 阴性特指: die"},
            {q: "Das ist [?] Lampe.", a: "eine", i: "💡", t: "Nom., 阴性泛指: eine"},
            {q: "Ich suche [?] Tasche.", a: "die", i: "👜", t: "Akk., 阴性特指: die"},
            {q: "Wo ist [?] Katze?", a: "die", i: "🐱", t: "Nom., 阴性特指: die"},
            {q: "Er isst [?] Pizza.", a: "eine", i: "🍕", t: "Akk., 阴性泛指: eine"},
            {q: "[?] Tür ist offen.", a: "Die", i: "🚪", t: "Nom., 阴性特指: Die"},
            {q: "Haben Sie [?] Frage?", a: "eine", i: "❓", t: "Akk., 阴性泛指: eine"},
            {q: "Das ist [?] Schule.", a: "eine", i: "🏫", t: "Nom., 阴性泛指: eine"},

            // --- 混合逻辑挑战 ---
            {q: "Ich habe [?] Fahrrad.", a: "ein", i: "🚲", t: "中性 das Fahrrad, Akk. 泛指用 ein"},
            {q: "Dort steht [?] Baum.", a: "ein", i: "🌳", t: "阳性 der Baum, Nom. 泛指用 ein"},
            {q: "Besuchst du [?] Oma?", a: "die", i: "👵", t: "阴性 die Oma, Akk. 特指用 die"},
            {q: "Ich nehme [?] Tee.", a: "den", i: "🍵", t: "阳性 der Tee, Akk. 特指用 den"},
            {q: "Das ist [?] Handy.", a: "ein", i: "📱", t: "中性 das Handy, Nom. 泛指用 ein"},
            {q: "Ich schreibe [?] E-Mail.", a: "eine", i: "📧", t: "阴性 die E-Mail, Akk. 泛指用 eine"},
            {q: "Er kauft [?] Tisch.", a: "den", i: "🪑", t: "阳性 der Tisch, Akk. 特指用 den"},
            {q: "Wir hören [?] Musik.", a: "die", i: "🎵", t: "阴性 die Musik, Akk. 特指用 die"}
        ];

        let idx = 0; let pool = []; let locked = false;

        function start() {
            pool = [...data].sort(() => Math.random() - 0.5);
            update();
        }

        function update() {
            locked = false; const item = pool[idx];
            document.getElementById('progress-fill').style.width = `${((idx+1)/pool.length)*100}%`;
            document.getElementById('step-label').innerText = `${idx+1} / ${pool.length}`;
            document.getElementById('img-icon').innerText = item.i;
            document.getElementById('txt-display').innerHTML = item.q.replace(/\[\?\]/g, `<span class="slot">?</span>`);
            
            // 核心改变：全量选项，让学生在三个性中辨析
            const allOpts = ["der", "die", "das", "den", "ein", "eine", "einen"];
            document.getElementById('opt-container').innerHTML = allOpts.map(o => 
                `<div class="option-box" onclick="check('${o}', this)"><span>${o}</span></div>`
            ).join('');
        }

        function check(val, el) {
            if(locked) return; locked = true;
            const item = pool[idx]; const slot = document.querySelector('.slot');
            slot.innerText = val; el.classList.add('active');
            
            if(val.toLowerCase() === item.a.toLowerCase()) {
                playDing(true); slot.classList.add('correct');
                confetti({ particleCount: 30, origin: { y: 0.8 } });
                setTimeout(() => { 
                    if(idx >= pool.length - 1) { 
                        localStorage.setItem('level10_cleared', 'true');
                        alert("🎉 真棒！三性冠词挑战圆满通关！"); 
                        location.href='index.html'; 
                    } else { idx++; update(); } 
                }, 1200);
            } else {
                playDing(false);
                document.getElementById('tip-text').innerText = item.t;
                document.getElementById('feedback-modal').style.display = 'flex';
            }
        }

        window.closePop = () => { document.getElementById('feedback-modal').style.display = 'none'; update(); };
        start();
    </script>
</body>
</html>
