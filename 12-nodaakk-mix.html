<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>12-定冠词变格全掌握 | 刘老师课堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        body { background: #F1F5F9; font-family: 'Noto Sans SC', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .app-container { width: 100%; max-width: 600px; height: 95vh; max-height: 850px; background: #FFFFFF; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; display: flex; flex-direction: column; overflow: hidden; border: 8px solid white; }
        
        .header-nav { padding: 25px 25px 15px; display: flex; align-items: center; gap: 15px; }
        .back-btn, .mute-btn { background: #F8FAFC; padding: 12px; border-radius: 18px; color: #64748B; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .back-btn:active, .mute-btn:active { transform: scale(0.9); background: #F1F5F9; }
        
        .progress-container { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .progress-info { font-size: 14px; font-weight: 900; color: #94A3B8; text-align: center; letter-spacing: 1px; }
        .progress-bar-bg { width: 100%; height: 10px; background: #E2E8F0; border-radius: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4338CA, #6366F1); transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 30px; }
        .scene-card { width: 100%; padding: 40px 20px; background: #F8FAFC; border-radius: 35px; text-align: center; border: 2px dashed #CBD5E1; min-height: 240px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .scene-emoji { font-size: 60px; margin-bottom: 15px; filter: drop-shadow(0 8px 8px rgba(0,0,0,0.1)); }
        .sentence-area { font-size: 1.4rem; font-weight: 800; color: #1E293B; line-height: 1.6; }
        .drop-zone { display: inline-block; min-width: 60px; border-bottom: 4px solid #4338CA; margin: 0 6px; color: transparent; vertical-align: baseline; transition: all 0.4s; }
        .drop-zone.correct { border-bottom-color: transparent; color: #10B981 !important; transform: scale(1.1); }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 6px 0 #1E1B4B; }
            50% { transform: scale(1.02); box-shadow: 0 10px 20px rgba(67, 56, 202, 0.2); }
        }
        .options-area { padding: 20px 25px 40px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .option-btn { background: #4338CA; border: 2px solid #3730A3; padding: 16px 0; border-radius: 20px; font-size: 1.4rem; font-weight: 900; color: white; box-shadow: 0 6px 0 #1E1B4B; transition: 0.1s; animation: breathe 4s infinite ease-in-out; }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1E1B4B; animation: none; }

        #teacher-tip { position: absolute; bottom: -100%; left: 0; right: 0; background: white; padding: 35px; border-radius: 40px 40px 0 0; box-shadow: 0 -15px 50px rgba(0,0,0,0.2); transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 100; border-top: 6px solid #4338CA; }
        #teacher-tip.active { bottom: 0; }
        
        #finish-modal { position: absolute; inset: 0; background: rgba(255,255,255,0.98); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-nav">
            <button onclick="window.location.href='map.html'" class="back-btn"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg></button>
            <div class="progress-container">
                <div class="progress-info">LEVEL 12: <span id="cur-num">1</span> / 40</div>
                <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            </div>
            <button onclick="toggleMute()" class="mute-btn" id="mute-trigger">
                <svg id="mute-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
        </div>

        <div class="main-stage">
            <div class="scene-card">
                <span class="scene-emoji" id="emoji-box"></span>
                <div class="sentence-area" id="sentence-box"></div>
            </div>
        </div>

        <div class="options-area" id="options-grid"></div>

        <div id="teacher-tip">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center text-2xl">👩‍🏫</div>
                <div><h3 class="text-lg font-black text-indigo-900">重点笔记</h3></div>
            </div>
            <div id="tip-text" class="text-slate-700 font-bold mb-6 text-md bg-slate-50 p-5 rounded-xl border-l-4 border-indigo-500"></div>
            <button onclick="closeTip()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-lg shadow-lg">记住了，下一题</button>
        </div>

        <div id="finish-modal">
            <div class="bg-white p-8 rounded-[40px] border-4 border-indigo-100 shadow-2xl">
                <span class="text-7xl mb-4 block">🏆</span>
                <h2 class="text-3xl font-black text-indigo-900 mb-2">变格大师！</h2>
                <p class="text-slate-500 font-bold mb-6">40道混战题全部通过<br>你的德语语感已经起飞了！</p>
                <button onclick="window.location.href='map.html'" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xl">收下奖杯并返回</button>
            </div>
        </div>
    </div>

    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-err" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        const rawData = [
            { s: "Ich danke ____ Vater für das Geschenk.", a: "dem", e: "🎁", t: "danken 支配第三格 (Dativ)。阳性 der 变为 dem。" },
            { s: "Wir sehen ____ Park von hier aus.", a: "den", e: "🌳", t: "sehen 支配第四格 (Akkusativ)。阳性 der 变为 den。" },
            { s: "____ Kinder spielen im Garten.", a: "Die", e: "⚽", t: "复数主语用第一格 (Nominativ)。定冠词为 Die。" },
            { s: "Ich gebe ____ Frau einen Apfel.", a: "der", e: "🍎", t: "给某人(三格)某物。阴性 die 变为 der。" },
            { s: "Ohne ____ Mantel ist es zu kalt.", a: "den", e: "🧥", t: "ohne 固定支配第四格。阳性 der 变为 den。" },
            { s: "Gefällt dir ____ Haus?", a: "das", e: "🏠", t: "gefallen 的主语是物(一格)。中性定冠词为 das。" },
            { s: "Ich antworte ____ Lehrer.", a: "dem", e: "💬", t: "antworten 支配第三格。阳性 der 变为 dem。" },
            { s: "Wir kaufen ____ Auto heute.", a: "das", e: "🚗", t: "及物动词买(第四格)。中性 das 保持不变。" },
            { s: "Das Buch gehört ____ Mädchen.", a: "dem", e: "👧", t: "gehören 支配第三格。中性 das 变为 dem。" },
            { s: "Ich trinke ____ Tee ohne Zucker.", a: "den", e: "☕", t: "喝(第四格)。阳性 der 变为 den。" },
            { s: "Mit ____ Hund gehe ich spazieren.", a: "dem", e: "🐕", t: "mit 支配第三格。阳性 der 变为 dem。" },
            { s: "____ Sonne ist heute sehr warm.", a: "Die", e: "☀️", t: "阴性主语一格。定冠词为 Die。" },
            { s: "Er sucht ____ Schlüssel.", a: "den", e: "🔑", t: "寻找(第四格)。阳性 der 变为 den。" },
            { s: "Wir helfen ____ Großeltern.", a: "den", e: "👴👵", t: "helfen 支配三格。复数 die 变为 den。" },
            { s: "____ Film ist wirklich langweilig.", a: "Der", e: "🎬", t: "阳性主语一格。定冠词为 Der。" },
            { s: "Ich schreibe ____ Freund einen Brief.", a: "dem", e: "✉️", t: "给某人(三格)写信。阳性 der 变为 dem。" },
            { s: "Siehst du ____ Mond?", a: "den", e: "🌙", t: "看见(第四格)。阳性 der 变为 den。" },
            { s: "____ Kaffee schmeckt gut.", a: "Der", e: "☕", t: "阳性主语一格。定冠词为 Der。" },
            { s: "Ich brauche ____ Hilfe von dir.", a: "die", e: "🆘", t: "需要(第四格)。阴性 die 保持不变。" },
            { s: "Das Handy liegt auf ____ Sofa.", a: "dem", e: "🛋️", t: "auf(在哪儿)支配三格。中性 das 变为 dem。" },
            { s: "Er bringt ____ Bruder ein Eis.", a: "dem", e: "🍦", t: "送给某人(三格)。阳性 der 变为 dem。" },
            { s: "Wir besuchen ____ Tante in Berlin.", a: "die", e: "🚄", t: "拜访(第四格)。阴性 die 保持不变。" },
            { s: "____ Tür ist leider geschlossen.", a: "Die", e: "🚪", t: "阴性主语一格。定冠词为 Die。" },
            { s: "Ich öffne ____ Fenster.", a: "das", e: "🪟", t: "打开(第四格)。中性 das 保持不变。" },
            { s: "Er spielt mit ____ Baby.", a: "dem", e: "👶", t: "mit 支配三格。中性 das 变为 dem。" },
            { s: "____ Lehrer erklärt die Grammatik.", a: "Der", e: "👨‍🏫", t: "阳性主语一格。定冠词为 Der。" },
            { s: "Ich kenne ____ Weg zum Bahnhof.", a: "den", e: "🛤️", t: "认识/知道(第四格)。阳性 der 变为 den。" },
            { s: "Das Kissen liegt in ____ Bett.", a: "dem", e: "🛌", t: "in(在哪儿)支配三格。中性 das 变为 dem。" },
            { s: "Geben Sie ____ Mann das Geld.", a: "dem", e: "💶", t: "递给某人(三格)。阳性 der 变为 dem。" },
            { s: "Wir essen ____ Suppe zusammen.", a: "die", e: "🥣", t: "吃(第四格)。阴性 die 保持不变。" },
            { s: "____ Äpfel liegen auf dem Tisch.", a: "Die", e: "🍎", t: "复数主语一格。定冠词为 Die。" },
            { s: "Er putzt ____ Fenster.", a: "das", e: "🧽", t: "擦(第四格)。中性 das 保持不变。" },
            { s: "Ich gratuliere ____ Kind zum Geburtstag.", a: "dem", e: "🎂", t: "gratulieren 支配第三格。中性 das 变为 dem。" },
            { s: "Haben Sie ____ Termin frei?", a: "den", e: "📅", t: "有(第四格)。阳性 der 变为 den。" },
            { s: "____ Lampe ist sehr hell.", a: "Die", e: "💡", t: "阴性主语一格。定冠词为 Die。" },
            { s: "Ich stelle die Vase auf ____ Tisch.", a: "den", e: "🏺", t: "auf(去哪儿/动作)支配第四格。阳性 der 变为 den。" },
            { s: "Das ist ____ Bruder von Peter.", a: "der", e: "👤", t: "表语用第一格。阳性定冠词为 der。" },
            { s: "Ich höre ____ Musik gern.", a: "die", e: "🎧", t: "听(第四格)。阴性 die 保持不变。" },
            { s: "Wir sitzen um ____ Tisch.", a: "den", e: "🪑", t: "um 固定支配第四格。阳性 der 变为 den。" },
            { s: "Er zeigt ____ Touristen den Weg.", a: "dem", e: "🗺️", t: "向某人(三格)展示。阳性单数 Touristen 变位 dem。" }
        ];

        let quizData = [...rawData].sort(() => Math.random() - 0.5);
        let currentIndex = 0; let isMuted = false; let canClick = true;

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('mute-icon');
            icon.innerHTML = isMuted ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />';
        }

        function playSound(type) { 
            if (!isMuted) { 
                const s = document.getElementById(type === 'ok' ? 'snd-ok' : 'snd-err'); 
                s.currentTime = 0; s.play().catch(()=>{}); 
            } 
        }

        function renderQuestion() {
            if (currentIndex >= quizData.length) { showFinal(); return; }
            canClick = true;
            const data = quizData[currentIndex];
            document.getElementById('emoji-box').innerText = data.e;
            document.getElementById('sentence-box').innerHTML = data.s.replace("____", `<span class="drop-zone">____</span>`);
            document.getElementById('cur-num').innerText = currentIndex + 1;
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) / 40 * 100) + '%';
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            // 4选项混淆逻辑
            let correct = data.a.toLowerCase();
            let others = ["der", "die", "das", "den", "dem"].filter(o => o !== correct).sort(() => Math.random() - 0.5);
            let options = [correct, ...others.slice(0, 3)].sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                // 处理句首大写
                const displayOpt = data.s.startsWith("____") ? opt.charAt(0).toUpperCase() + opt.slice(1) : opt;
                btn.innerText = displayOpt;
                
                btn.onclick = () => {
                    if(!canClick) return;
                    if(opt === correct) {
                        canClick = false; 
                        playSound('ok'); 
                        if("vibrate" in navigator) navigator.vibrate(50);
                        const dz = document.querySelector('.drop-zone'); 
                        dz.innerText = data.a; 
                        dz.classList.add('correct');
                        setTimeout(() => { currentIndex++; renderQuestion(); }, 1500);
                    } else {
                        playSound('err'); 
                        document.getElementById('tip-text').innerText = data.t;
                        document.getElementById('teacher-tip').classList.add('active'); 
                        canClick = false;
                    }
                };
                grid.appendChild(btn);
            });
        }

        function closeTip() { 
            document.getElementById('teacher-tip').classList.remove('active'); 
            canClick = true; 
        }

        function showFinal() {
            // 设置地图勋章标记
            localStorage.setItem('level12_cleared', 'true');
            
            document.getElementById('finish-modal').style.display = 'flex';
            confetti({ 
                particleCount: 200, 
                spread: 80, 
                origin: { y: 0.6 },
                colors: ['#4338CA', '#6366F1', '#FFD700'] 
            });
        }

        renderQuestion();
    </script>
</body>
</html>
