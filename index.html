<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直击 A1 德语焦虑 | 清零负担</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { background-color: #F8FAFC; font-family: 'Noto Sans SC', sans-serif; color: #1E293B; -webkit-tap-highlight-color: transparent; }
        @media (min-width: 1024px) { .app-container { transform: scale(1.1); transform-origin: top; } }
        .premium-card { background: #FFFFFF; border: 1px solid #E2E8F0; border-bottom: 4px solid #E2E8F0; border-radius: 28px; transition: all 0.2s cubic-bezier(0, 0, 0.2, 1); cursor: pointer; }
        .premium-card:active { transform: translateY(2px); border-bottom-width: 1px; }
        .duo-btn { background: #58CC02; border-bottom: 4px solid #46A302; color: white; border-radius: 18px; font-weight: 900; }
        .locked-state { opacity: 0.45; filter: grayscale(0.85); pointer-events: none; }
        
        /* 奖牌弹出动画 */
        .medal-pop { animation: medalPop 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes medalPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
    </style>
</head>
<body class="pt-10 pb-16 px-6"> 
    <div class="app-container max-w-[480px] mx-auto flex flex-col min-h-[90vh]">
        <header class="text-center mb-10">
            <h1 class="text-4xl lg:text-5xl font-black text-slate-900 mb-5 tracking-tighter">直击 A1 德语焦虑</h1>
            <div class="flex items-center justify-center gap-5 text-slate-400 font-bold tracking-[0.3em] uppercase">
                <div class="w-10 h-px bg-slate-200 rounded-full"></div>
                <h2 class="text-lg lg:text-xl">清零负担</h2>
                <div class="w-10 h-px bg-slate-200 rounded-full"></div>
            </div>
        </header>

        <main class="flex-grow space-y-8">
            <div id="dynamic-panel" class="p-2 text-center">
                <div id="auth-group" class="premium-card p-10 shadow-sm border-sky-100 bg-sky-50/50">
                    <input id="key-input" type="text" placeholder="••••" class="w-full py-5 text-center bg-slate-50 rounded-2xl mb-8 outline-none font-black text-3xl border-2 border-transparent focus:border-sky-400">
                    <button onclick="unlock()" class="w-full py-5 duo-btn text-xl shadow-lg shadow-green-100">立即开始闯关</button>
                </div>
            </div>

            <div class="space-y-8">
                <div id="lvl1" onclick="go(1)" class="premium-card p-7 flex items-center gap-6 relative locked-state shadow-sm">
                    <div class="w-16 h-16 bg-[#58CC02] rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-inner">1</div>
                    <div>
                        <h3 class="font-black text-xl lg:text-2xl text-slate-800 mb-1">名词词性捕手</h3>
                        <p class="text-xs font-bold text-slate-400 lowercase tracking-[0.2em]">der / die / das</p>
                    </div>
                    <div id="m1" class="absolute -top-3 -right-3 text-5xl drop-shadow-md medal-pop"></div>
                </div>

                <div id="lvl2" onclick="go(2)" class="premium-card p-7 flex items-center gap-6 relative locked-state shadow-sm">
                    <div class="w-16 h-16 bg-[#00D4FF] rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-inner">2</div>
                    <div>
                        <h3 class="font-black text-xl lg:text-2xl text-slate-800 mb-1">词性规律一眼破</h3>
                        <p class="text-xs font-bold text-slate-400 lowercase tracking-[0.2em]">规律分类练习</p>
                    </div>
                    <div id="m2" class="absolute -top-3 -right-3 text-5xl drop-shadow-md medal-pop"></div>
                </div>

                <div id="lvl3" onclick="go(3)" class="premium-card p-7 flex items-center gap-6 relative locked-state shadow-sm border-purple-100">
                    <div class="w-16 h-16 bg-[#A855F7] rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-inner">3</div>
                    <div>
                        <h3 class="font-black text-xl lg:text-2xl text-slate-800 mb-1">复数实验室</h3>
                        <p class="text-xs font-bold text-slate-400 lowercase tracking-[0.2em]">Plural-Labor</p>
                    </div>
                    <div id="m3" class="absolute -top-3 -right-3 text-5xl drop-shadow-md medal-pop"></div>
                </div>

                <div id="lvl4" onclick="go(4)" class="premium-card p-7 flex items-center gap-6 relative locked-state shadow-sm border-orange-100">
                    <div class="w-16 h-16 bg-[#F59E0B] rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-inner">4</div>
                    <div>
                        <h3 class="font-black text-xl lg:text-2xl text-slate-800 mb-1">弱变化动词驯服记</h3>
                        <p class="text-xs font-bold text-slate-400 lowercase tracking-[0.2em]">Verbkonjugation</p>
                    </div>
                    <div id="m4" class="absolute -top-3 -right-3 text-5xl drop-shadow-md medal-pop"></div>
                </div>

                <div id="lvl5" onclick="go(5)" class="premium-card p-7 flex items-center gap-6 relative locked-state shadow-sm border-rose-100">
                    <div class="w-16 h-16 bg-[#F43F5E] rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-inner">5</div>
                    <div>
                        <h3 class="font-black text-xl lg:text-2xl text-slate-800 mb-1">强变化动词急救包</h3>
                        <p class="text-xs font-bold text-slate-400 lowercase tracking-[0.2em]">Starke Verben</p>
                    </div>
                    <div id="m5" class="absolute -top-3 -right-3 text-5xl drop-shadow-md medal-pop"></div>
                </div>
            </div>
        </main>

        <footer class="mt-24 text-center space-y-8 pb-10">
            <div class="inline-flex items-center px-10 py-3 bg-white border border-slate-100 rounded-full shadow-sm">
                <span class="text-xs font-black text-slate-300 uppercase tracking-widest">咨询微信:</span>
                <span class="text-sm font-black text-slate-500 ml-2 uppercase">gehtalles</span>
            </div>
            <div><button onclick="clearAll()" class="text-[10px] font-bold text-slate-300 underline">RESET PROGRESS</button></div>
        </footer>
    </div>

    <script>
        function checkStatus() {
            const unlocked = localStorage.getItem('isUnlocked') === 'true';
            if (unlocked) {
                document.getElementById('auth-group').style.display = 'none';
                // 更新解锁列表，加入 lvl5
                ['lvl1', 'lvl2', 'lvl3', 'lvl4', 'lvl5'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.classList.remove('locked-state');
                });
            }

            // 奖牌显示逻辑
            const s1Score = localStorage.getItem('stage1_score'); 
            if (s1Score === 'gold') { document.getElementById('m1').innerText = "🥇"; }
            else if (s1Score === 'silver') { document.getElementById('m1').innerText = "🥈"; }
            
            if (localStorage.getItem('level2_cleared') === 'true') { document.getElementById('m2').innerText = "🏅"; }
            if (localStorage.getItem('level3_cleared') === 'true') { document.getElementById('m3').innerText = "🧪"; }
            if (localStorage.getItem('level4_cleared') === 'true') { document.getElementById('m4').innerText = "⚔️"; }
            // 第五关奖牌逻辑
            if (localStorage.getItem('level5_cleared') === 'true') { document.getElementById('m5').innerText = "🚑"; }
        }

        function unlock() {
            if (document.getElementById('key-input').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                checkStatus();
            } else { alert("请输入正确的激活码"); }
        }

        function go(n) { 
            if (localStorage.getItem('isUnlocked') === 'true') {
                // 更新页面路径映射，加入第五关
                const pages = {
                    1: '01-gender.html', 
                    2: '02-classify.html', 
                    3: '03-plural.html', 
                    4: '04-verbs.html',
                    5: '05-starke-verben.html'
                };
                window.location.href = pages[n];
            } 
        }

        function clearAll() { 
            if (confirm("确定重置进度吗？")) { localStorage.clear(); location.reload(); } 
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
