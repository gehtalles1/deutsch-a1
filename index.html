<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语 A1 闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; color: #064E3B; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px 40px; }
        .main-card { background: white; border-radius: 40px; border: 2px solid #F1EFE0; position: relative; }
        .locked { opacity: 0.3; filter: grayscale(1); pointer-events: none !important; }
        .unlocked-card { opacity: 1 !important; filter: none !important; pointer-events: auto !important; cursor: pointer; border-color: #059669 !important; }
        .medal-badge { position: absolute; top: -15px; right: -15px; font-size: 3rem; z-index: 50; }
    </style>
</head>
<body class="py-12">
    <div class="app-container">
        <header class="text-center mb-16">
            <h1 class="text-4xl font-black text-emerald-950">A1 德语通关</h1>
        </header>

        <div id="auth-section" class="main-card p-10 mb-12 text-center shadow-sm">
            <input id="code" type="text" placeholder="输入 8888 激活" class="w-full p-5 mb-4 rounded-3xl bg-gray-50 border-none text-center font-bold text-xl ring-2 ring-emerald-50 focus:ring-emerald-500 outline-none">
            <button onclick="unlock()" class="w-full py-5 bg-emerald-900 text-white rounded-3xl font-black shadow-lg">立即激活</button>
        </div>

        <div class="space-y-8">
            <div class="relative">
                <div id="medal-slot" class="medal-badge"></div>
                <div id="lv1" onclick="window.location.href='01-gender.html'" class="locked main-card p-8 flex items-center gap-6">
                    <div class="w-14 h-14 bg-emerald-800 rounded-2xl flex items-center justify-center text-white font-black text-2xl italic">1</div>
                    <div class="flex-1">
                        <h3 class="font-black text-xl text-emerald-950">名词性别挑战</h3>
                        <p id="lv1-msg" class="text-[10px] font-bold text-gray-400">未解锁</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() { render(); };
        function unlock() {
            if(document.getElementById('code').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                render();
            } else { alert("激活码错误"); }
        }
        function render() {
            const isUnlocked = localStorage.getItem('isUnlocked') === 'true';
            const cleared = localStorage.getItem('stage1_cleared') === 'true';
            const medal = localStorage.getItem('stage1_medal');

            if(isUnlocked) {
                document.getElementById('auth-section').innerHTML = `<p class="font-black text-emerald-800 text-xl py-4">✅ 解锁成功，开始挑战！</p>`;
                const card = document.getElementById('lv1');
                card.classList.remove('locked');
                card.classList.add('unlocked-card');
                document.getElementById('lv1-msg').innerText = "点击进入第一关";
                document.getElementById('lv1-msg').style.color = "#059669";
            }
            // 纯净勋章显示，不带数字
            if(cleared && medal) {
                document.getElementById('medal-slot').innerHTML = (medal === 'gold') ? '🥇' : '🥈';
            }
        }
    </script>
</body>
</html>
