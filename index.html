<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语通关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; color: #064E3B; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px 40px; }
        .main-card { background: white; border-radius: 40px; border: 2px solid #F1EFE0; position: relative; transition: all 0.3s; }
        /* 核心：解锁后的视觉效果 */
        .btn-active { opacity: 1 !important; filter: none !important; pointer-events: auto !important; transform: scale(1.02); border-color: #059669 !important; }
        .locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .medal-badge { position: absolute; top: -12px; right: -12px; font-size: 2.8rem; z-index: 50; line-height: 1; }
    </style>
</head>
<body class="py-12">
    <div class="app-container">
        <header class="text-center mb-16">
            <h1 class="text-4xl font-black text-emerald-950 leading-tight">A1 德语焦虑<br><span class="text-emerald-600 text-3xl">直接清零</span></h1>
        </header>

        <div id="auth-section" class="main-card p-10 mb-12 shadow-sm">
            <input id="code" type="text" placeholder="输入 8888 激活" class="w-full p-5 mb-6 rounded-3xl bg-gray-50 border-none text-center font-bold text-xl outline-none ring-2 ring-emerald-50 focus:ring-emerald-500">
            <button onclick="handleUnlock()" class="w-full py-5 bg-emerald-900 text-white rounded-3xl font-black text-lg active:scale-95 shadow-lg">立即激活</button>
        </div>

        <div class="space-y-8">
            <div class="relative">
                <div id="medal-1" class="medal-badge"></div>
                <a id="lv1" href="01-gender.html" class="locked main-card block p-8 flex items-center gap-6">
                    <div class="w-14 h-14 bg-emerald-800 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-black text-2xl italic">1</div>
                    <div class="flex-1">
                        <h3 class="font-black text-xl text-emerald-950">名词性别挑战</h3>
                        <p id="lv1-msg" class="text-[10px] font-bold text-gray-400 tracking-widest mt-1 uppercase">未解锁</p>
                    </div>
                </a>
            </div>

            <div class="relative">
                <div class="locked main-card p-8 flex items-center gap-6">
                    <div class="w-14 h-14 bg-emerald-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-black text-2xl italic">2</div>
                    <div class="flex-1">
                        <h3 class="font-black text-xl text-emerald-950">动词变位练习</h3>
                        <p class="text-[10px] font-bold text-gray-300 tracking-widest mt-1 uppercase">完成第一关开启</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-24 text-center">
            <p class="text-[10px] text-gray-300 font-black tracking-widest uppercase mb-4">Lehrer Liu Nian</p>
            <div class="inline-block px-6 py-2 rounded-full border border-gray-100 text-[10px] font-bold text-gray-400 tracking-tighter">咨询微信: <span class="text-emerald-800">gehtalles</span></div>
        </footer>
    </div>

    <script>
        // 页面启动时检查状态
        window.onload = function() {
            render();
        };

        function handleUnlock() {
            if(document.getElementById('code').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                render();
            } else {
                alert("激活码无效");
            }
        }

        function render() {
            const isUnlocked = localStorage.getItem('isUnlocked') === 'true';
            const cleared = localStorage.getItem('stage1_cleared') === 'true';
            const medal = localStorage.getItem('stage1_medal');

            // 1. 处理激活解锁
            if(isUnlocked) {
                document.getElementById('auth-section').innerHTML = `<p class="text-center font-black text-emerald-800 py-4 text-xl">🎉 已为您解锁全关卡</p>`;
                const card1 = document.getElementById('lv1');
                card1.classList.remove('locked');
                card1.classList.add('btn-active');
                document.getElementById('lv1-msg').innerText = "点击开始练习";
                document.getElementById('lv1-msg').className = "text-[10px] font-bold text-emerald-600 tracking-widest mt-1";
            }

            // 2. 处理金银牌显示（彻底防止数字2）
            if(cleared && medal) {
                const medalSlot = document.getElementById('medal-1');
                // 强制只注入 Emoji，清空任何潜在的数字内容
                medalSlot.innerHTML = (medal === 'gold') ? '🥇' : '🥈';
            }
        }
    </script>
</body>
</html>
