<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语 A1 闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-card { background: #FFFFFF; border-radius: 40px; border: 2px solid #F1EFE0; transition: all 0.3s; position: relative; }
        .is-locked { filter: grayscale(1); opacity: 0.3; pointer-events: none; }
        .medal-badge { position: absolute; top: -8px; right: -8px; font-size: 2.2rem; z-index: 10; }
    </style>
</head>
<body class="py-12 px-8">
    <div class="max-w-[500px] mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-emerald-950 mb-2">A1 德语焦虑</h1>
            <p class="text-emerald-700 font-black text-xl">直接清零</p>
        </header>

        <div id="status-area" class="mb-10">
            <div id="auth-box" class="main-card p-8 shadow-sm">
                <input id="unlock-code" type="text" placeholder="输入 8888 开启挑战" class="w-full py-4 text-center rounded-2xl bg-gray-50 mb-4 outline-none border-2 border-transparent focus:border-emerald-500 font-bold text-xl">
                <button onclick="unlock()" class="w-full py-4 bg-emerald-900 text-white font-black rounded-2xl text-lg active:scale-95 transition-all">立即激活</button>
            </div>
            <div id="welcome-msg" class="main-card p-8 text-center shadow-sm hidden">
                <p class="text-emerald-800 font-black text-xl">🎉 跟着刘老师，稳过 A1</p>
            </div>
        </div>

        <div class="space-y-6">
            <div id="lv1" onclick="window.location.href='01-gender.html'" class="main-card p-6 flex items-center gap-5 is-locked cursor-pointer shadow-sm">
                <div class="w-14 h-14 bg-emerald-800 rounded-2xl text-white flex items-center justify-center font-black text-2xl shadow-md">1</div>
                <div>
                    <h3 class="font-black text-xl text-emerald-950">名词词性捕手</h3>
                    <p id="s1-hint" class="text-xs text-gray-400 font-bold tracking-widest mt-1 uppercase">DER / DIE / DAS 终结者</p>
                </div>
                <div id="medal-1" class="medal-badge"></div>
            </div>
        </div>

        <footer class="mt-20 text-center pb-10">
            <div class="inline-block px-8 py-3 rounded-full border border-gray-100 bg-white text-xs font-bold text-gray-400 shadow-sm">
                咨询微信: <span class="text-emerald-800">gehtalles</span>
            </div>
        </footer>
    </div>

    <script>
        function refresh() {
            const unlocked = localStorage.getItem('isUnlocked') === 'true';
            const s1Done = localStorage.getItem('stage1_cleared') === 'true';

            if(unlocked) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('welcome-msg').classList.remove('hidden');
                document.getElementById('lv1').classList.remove('is-locked');
                document.getElementById('lv1').style.pointerEvents = 'auto';
            }
            if(s1Done) {
                document.getElementById('medal-1').innerText = "🥇";
                document.getElementById('s1-hint').innerText = "已达成 100% 正确率";
                document.getElementById('s1-hint').classList.replace('text-gray-400', 'text-emerald-600');
            }
        }

        function unlock() {
            if(document.getElementById('unlock-code').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                refresh();
            } else { alert("代码有误，请重试"); }
        }
        window.onload = refresh;
    </script>
</body>
</html>
