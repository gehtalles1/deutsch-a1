<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #FFFFFF; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; color: #4B4B4B; }
        .duo-card { 
            background: #FFFFFF; border: 2px solid #E5E5E5; border-bottom: 6px solid #E5E5E5;
            border-radius: 24px; transition: all 0.2s; cursor: pointer;
        }
        .duo-card:active { transform: translateY(4px); border-bottom-width: 2px; }
        .btn-green { 
            background: #58CC02; border-bottom: 6px solid #46A302; color: white; 
            border-radius: 16px; font-weight: 900;
        }
        .btn-green:active { transform: translateY(4px); border-bottom-width: 2px; }
        .locked { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
        .medal-float { position: absolute; top: -12px; right: -12px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
    </style>
</head>
<body class="py-10 px-6">
    <div class="max-w-[480px] mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-black text-[#3C3C3C] tracking-tight">A1 德语焦虑</h1>
            <div class="inline-block mt-2 px-4 py-1 bg-[#CEE9FF] text-[#1899FF] rounded-xl text-sm font-black">直接清零</div>
        </header>

        <div id="hero-area" class="mb-10">
            <div id="auth-section" class="duo-card p-8 text-center">
                <p class="font-black text-xl mb-6">请输入激活码</p>
                <input id="code" type="text" placeholder="输入 8888" class="w-full py-4 text-center bg-[#F7F7F7] rounded-2xl mb-6 outline-none font-black text-2xl border-2 border-transparent focus:border-[#84D8FF]">
                <button onclick="unlock()" class="w-full py-4 btn-green text-xl">开启挑战</button>
            </div>
            <div id="welcome-msg" class="hidden duo-card p-6 flex items-center gap-4 border-[#DDF4FF] bg-[#F1F9FF]">
                <span class="text-3xl">🎉</span>
                <p class="font-black text-[#1899FF] text-lg">跟着刘老师，稳过 A1</p>
            </div>
        </div>

        <div class="space-y-6">
            <div id="lv1" onclick="location.href='01-gender.html'" class="duo-card p-6 flex items-center gap-5 relative locked">
                <div class="w-16 h-16 bg-[#58CC02] rounded-2xl flex items-center justify-center text-white font-black text-3xl shadow-inner">1</div>
                <div>
                    <h3 class="font-black text-xl text-[#3C3C3C]">名词词性捕手</h3>
                    <p id="s1-status" class="text-xs font-black text-[#AFAFAF] uppercase tracking-widest mt-1">Der / Die / Das</p>
                </div>
                <div id="medal-1" class="medal-float text-4xl"></div>
            </div>
        </div>

        <footer class="mt-24 text-center">
            <div class="text-[#AFAFAF] font-black text-sm mb-4">咨询微信: gehtalles</div>
            <button onclick="localStorage.clear();location.reload();" class="text-[8px] text-gray-100">Reset</button>
        </footer>
    </div>

    <script>
        function update() {
            const isUnlocked = localStorage.getItem('isUnlocked') === 'true';
            const s1Done = localStorage.getItem('stage1_cleared') === 'true';

            if(isUnlocked) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('welcome-msg').style.display = 'flex';
                document.getElementById('lv1').classList.remove('locked');
            }
            if(s1Done) {
                document.getElementById('medal-1').innerText = "🥇";
                document.getElementById('s1-status').innerText = "已完美通关";
                document.getElementById('s1-status').style.color = "#58CC02";
            }
        }
        function unlock() {
            if(document.getElementById('code').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                update();
            } else { alert("激活码错误"); }
        }
        window.onload = update;
    </script>
</body>
</html>
