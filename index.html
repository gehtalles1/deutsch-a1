<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直击 A1 德语焦虑 | 刘老师德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #FFFFFF; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 还原截图中的错位布局 */
        .level-row { display: flex; align-items: center; width: 100%; margin-bottom: 4rem; }
        .level-row.left { justify-content: flex-start; padding-left: 10%; }
        .level-row.right { justify-content: flex-end; padding-right: 10%; flex-direction: row-reverse; }

        /* 还原截图中的圆圈样式 */
        .node-circle {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 6px solid #FFFFFF; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.2s; cursor: pointer;
        }
        .node-circle:active { transform: scale(0.9); }
        .node-blue { background: #3B82F6; }
        .node-gray { background: #E2E8F0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .level-info { margin: 0 1.5rem; }
        .level-row.right .level-info { text-align: right; }

        .tag { 
            display: inline-block; background: #0F172A; color: white; 
            padding: 4px 16px; border-radius: 100px; font-size: 10px; 
            font-weight: 900; letter-spacing: 0.2em;
        }
    </style>
</head>
<body class="flex justify-center bg-white min-h-screen">
    <div class="max-w-[440px] w-full px-8 py-16 flex flex-col items-center">
        
        <div class="text-center mb-20">
            <h1 class="text-[36px] font-black text-[#0F172A] leading-tight mb-1">直击 A1 德语焦虑</h1>
            <h2 class="text-2xl font-black text-[#94A3B8] mb-6">清零负担</h2>
            <div class="tag uppercase">跟着刘老师，稳过 A1</div>
        </div>

        <div class="w-full space-y-12">
            
            <div class="level-row left">
                <div onclick="location.href='01-bubble.html'" class="node-circle node-blue">
                    <span class="text-white text-3xl font-black italic">01</span>
                </div>
                <div class="level-info">
                    <div class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Level 1</div>
                    <div class="text-xl font-black text-slate-800">名词词性捕手</div>
                </div>
            </div>

            <div class="level-row right">
                <div id="btn-2" onclick="checkLock(2)" class="node-circle node-gray">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" /></svg>
                </div>
                <div class="level-info">
                    <div class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Level 2</div>
                    <div class="text-lg font-black text-[#94A3B8]">词性潜规则：一眼识破<br>der/die/das</div>
                </div>
            </div>

            <div class="level-row left">
                <div class="node-circle node-gray opacity-50">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" /></svg>
                </div>
                <div class="level-info">
                    <div class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Level 3</div>
                    <div class="text-xl font-black text-slate-200">动词变位迷宫</div>
                </div>
            </div>

        </div>

        <div class="mt-auto pt-20 text-center">
            <div class="flex items-center justify-center gap-2 mb-1">
                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">咨询微信:</span>
                <span class="text-sm font-black text-slate-600">gehtalles</span>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[9px] font-black text-slate-200 uppercase tracking-[0.4em]">Reset Progress</button>
        </div>

    </div>

    <script>
        // 检测第二关是否已解锁
        window.onload = () => {
            if(localStorage.getItem('unlocked_2') === 'true') {
                const circle = document.getElementById('btn-2');
                circle.classList.remove('node-gray');
                circle.classList.add('bg-gradient-to-br', 'from-rose-400', 'to-rose-600');
                circle.innerHTML = '<span class="text-white text-3xl font-black italic">02</span>';
                circle.onclick = () => location.href = '02-classify.html';
            }
        };

        function checkLock(id) {
            const code = prompt("请输入暗号（8888）解锁第二关：");
            if (code === '8888') {
                localStorage.setItem('unlocked_2', 'true');
                location.reload();
            } else if (code !== null) {
                alert("暗号不对哦，快去私信刘老师吧！");
            }
        }
    </script>
</body>
</html>
