<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语通关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; color: #064E3B; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px 40px; }
        .main-card { background: white; border-radius: 40px; border: 2px solid #F1EFE0; position: relative; cursor: pointer; }
        .locked { opacity: 0.3; filter: grayscale(1); pointer-events: none !important; }
        .medal-badge { position: absolute; top: -12px; right: -12px; font-size: 2.8rem; z-index: 50; }
    </style>
</head>
<body class="py-12">
    <div class="app-container">
        <header class="text-center mb-16">
            <h1 class="text-4xl font-black text-emerald-950 leading-tight">A1 德语练习<br><span class="text-emerald-600 text-3xl">通关宝盒</span></h1>
        </header>

        <div id="auth-section" class="main-card p-10 mb-12 shadow-sm">
            <input id="code-input" type="text" placeholder="输入 8888 激活" class="w-full p-5 mb-6 rounded-3xl bg-gray-50 border-none text-center font-bold text-xl outline-none ring-2 ring-emerald-50 focus:ring-emerald-500">
            <button onclick="handleUnlock()" class="w-full py-5 bg-emerald-900 text-white rounded-3xl font-black text-lg active:scale-95 shadow-lg">立即激活</button>
        </div>

        <div class="space-y-8">
            <div class="relative">
                <div id="medal-1" class="medal-badge"></div>
                <div id="lv1-card" onclick="goToLevel1()" class="locked main-card p-8 flex items-center gap-6">
                    <div class="w-14 h-14 bg-emerald-800 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-black text-2xl italic">1</div>
                    <div class="flex-1">
                        <h3 class="font-black text-xl text-emerald-950">名词性别挑战</h3>
                        <p id="lv1-status" class="text-[10px] font-bold text-gray-400 tracking-widest mt-1 uppercase">未解锁</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() { updateUI(); };

        function handleUnlock() {
            if(document.getElementById('code-input').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                updateUI();
            } else { alert("激活码无效"); }
        }

        function updateUI() {
            const isUnlocked = localStorage.getItem('isUnlocked') === 'true';
            const cleared = localStorage.getItem('stage1_cleared') === 'true';
            const medal = localStorage.getItem('stage1_medal');

            if(isUnlocked) {
                document.getElementById('auth-section').innerHTML = `<p class="text-center font-black text-emerald-800 py-4 text-xl">🎉 欢迎刘老师的学生！</p>`;
                document.getElementById('lv1-card').classList.remove('locked');
                document.getElementById('lv1-status').innerText = "点击进入第一关";
                document.getElementById('lv1-status').classList.replace('text-gray-400', 'text-emerald-600');
            }

            if(cleared && medal) {
                document.getElementById('medal-1').innerHTML = (medal === 'gold') ? '🥇' : '🥈';
            }
        }

        // 强制跳转函数，防止 <a> 标签失效
        function goToLevel1() {
            if(localStorage.getItem('isUnlocked') === 'true') {
                window.location.href = "01-gender.html";
            }
        }
    </script>
</body>
</html>
