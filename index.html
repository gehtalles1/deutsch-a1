<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>德语 A1 闯关地图 | 刘老师德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap');
        body { background: #f8fafc; font-family: 'Noto Sans SC', sans-serif; overflow-x: hidden; }
        
        .map-container { position: relative; padding: 60px 20px; min-height: 100vh; }
        
        /* 贝塞尔曲线路径模拟 */
        .path-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.1;
        }

        .level-node {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; z-index: 10;
        }
        .level-node:active { transform: scale(0.9); }
        
        .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        .locked .node-circle { background: #cbd5e1 !important; border-color: #94a3b8 !important; }

        /* 气泡浮动动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>

    <div class="map-container max-w-md mx-auto flex flex-col items-center">
        
        <div class="text-center mb-16 px-4">
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter leading-tight">直击 A1 德语焦虑</h1>
            <h2 class="text-2xl font-black text-slate-400 mt-1">清零负担</h2>
            <div class="mt-4 inline-block px-4 py-1 bg-slate-900 text-white text-xs font-bold rounded-full tracking-widest">
                跟着刘老师，稳过 A1
            </div>
        </div>

        <div id="map-levels" class="w-full space-y-24 relative">
            </div>

        <div class="mt-32 mb-10 text-center">
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-2">Developed by @刘老师德语</p>
            <div class="flex items-center justify-center gap-2 text-slate-400 font-bold">
                <span class="text-xs">咨询微信:</span>
                <span class="text-sm text-slate-600">gehtalles</span>
            </div>
            <button onclick="resetProgress()" class="mt-8 text-[10px] text-slate-300 underline font-bold uppercase tracking-widest">Reset Progress</button>
        </div>
    </div>

    <script>
        // 核心数据配置
        const LEVELS = [
            { id: 1, name: "名词词性捕手", path: "01-bubble.html", color: "from-blue-400 to-blue-600" },
            { id: 2, name: "词性潜规则：一眼识破 der/die/das", path: "02-classify.html", color: "from-rose-400 to-rose-600" },
            { id: 3, name: "动词变位迷宫", path: "#", color: "from-amber-400 to-amber-600" },
            { id: 4, name: "句型构造工坊", path: "#", color: "from-emerald-400 to-emerald-600" }
        ];

        function renderMap() {
            const container = document.getElementById('map-levels');
            const unlockedLevel = parseInt(localStorage.getItem('unlockedLevel') || '1');
            
            container.innerHTML = LEVELS.map((level, index) => {
                const isLocked = level.id > unlockedLevel;
                const isEven = index % 2 !== 0; // 奇偶排布形成 S 型
                const alignClass = isEven ? 'flex-row-reverse text-right' : 'flex-row text-left';
                const offsetClass = isEven ? 'pr-8' : 'pl-8';

                return `
                    <div class="flex items-center ${alignClass} w-full px-4">
                        <div onclick="${isLocked ? `checkLock(${level.id})` : `location.href='${level.path}'`}" 
                             class="level-node ${isLocked ? 'locked' : 'float-anim'} cursor-pointer">
                            <div class="node-circle w-20 h-20 rounded-full bg-gradient-to-br ${level.color} shadow-xl border-4 border-white flex items-center justify-center">
                                ${isLocked ? 
                                    '<svg class="w-8 h-8 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>' : 
                                    `<span class="text-white text-2xl font-black italic">${level.id < 10 ? '0'+level.id : level.id}</span>`
                                }
                            </div>
                        </div>
                        <div class="flex-1 ${offsetClass} py-2">
                            <div class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Level ${level.id}</div>
                            <div class="text-lg font-black ${isLocked ? 'text-slate-400' : 'text-slate-800'} leading-tight">
                                ${level.name}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 解锁逻辑
        function checkLock(id) {
            const code = prompt("请输入解锁码解锁后续关卡：");
            if (code === '8888') {
                localStorage.setItem('unlockedLevel', id);
                renderMap();
            } else {
                alert("解锁码不正确，请联系刘老师获取。");
            }
        }

        function resetProgress() {
            if(confirm("确定要重置所有闯关进度吗？")) {
                localStorage.clear();
                location.reload();
            }
        }

        renderMap();
    </script>
</body>
</html>
