<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语 A1 闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; }
        .main-card { background: #FFFFFF; border-radius: 40px; border: 2px solid #F1EFE0; }
        .btn-primary { background: #064E3B; color: white; font-weight: 900; }
        /* 视觉灰化，但不设 pointer-events，确保 JS 能捕获点击 */
        .is-locked { filter: grayscale(1); opacity: 0.3; }
    </style>
</head>
<body class="py-12 px-8">
    <div class="max-w-[500px] mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-emerald-950 mb-2">A1 德语焦虑</h1>
            <p class="text-emerald-700 font-black">直接清零</p>
        </header>

        <div id="dynamic-container" class="mb-10">
            <div id="auth-box" class="main-card p-8">
                <input id="unlock-code" type="text" placeholder="输入激活码" class="w-full py-4 text-center rounded-2xl bg-gray-50 mb-4 outline-none">
                <button onclick="unlock()" class="w-full py-4 btn-primary rounded-2xl">立即解锁</button>
            </div>
            <div id="success-msg" class="main-card p-6 text-center text-emerald-800 font-black hidden">
                🎉 解锁成功！跟着刘老师，稳过 A1
            </div>
        </div>

        <div class="space-y-6">
            <div id="lv1-btn" onclick="startLevel(1)" class="main-card p-6 flex items-center gap-4 is-locked">
                <div class="w-12 h-12 bg-emerald-800 rounded-2xl text-white flex items-center justify-center font-black">1</div>
                <h3 class="font-black text-lg">名词词性捕手</h3>
            </div>
        </div>
    </div>

    <script>
        window.onload = refresh;

        function refresh() {
            const unlocked = localStorage.getItem('isUnlocked') === 'true';
            if (unlocked) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
                document.getElementById('lv1-btn').classList.remove('is-locked');
            }
        }

        function unlock() {
            if(document.getElementById('unlock-code').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                refresh();
            } else { alert("代码有误"); }
        }

        function startLevel(num) {
            // 🚨 严谨的单层逻辑判断
            if (localStorage.getItem('isUnlocked') !== 'true') {
                alert("请先解锁");
                return;
            }
            window.location.href = "01-gender.html";
        }
    </script>
</body>
</html>
