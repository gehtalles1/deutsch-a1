<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语 A1 闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-card { background: #FFFFFF; border-radius: 40px; border: 2px solid #F1EFE0; transition: all 0.3s; cursor: pointer; }
        .btn-primary { background: #064E3B; color: white; font-weight: 900; }
        .is-locked { filter: grayscale(1); opacity: 0.3; }
        .medal-icon { position: absolute; top: -10px; right: -10px; font-size: 2.5rem; }
    </style>
</head>
<body class="py-12 px-8">
    <div class="max-w-[500px] mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-emerald-950 mb-2">A1 德语焦虑</h1>
            <p class="text-emerald-700 font-black">直接清零</p>
        </header>

        <div id="top-area" class="mb-10">
            <div id="auth-box" class="main-card p-8">
                <input id="code-input" type="text" placeholder="输入 8888 开启挑战" class="w-full py-4 text-center rounded-2xl bg-gray-50 mb-4 outline-none border-2 border-transparent focus:border-emerald-500 font-bold text-xl">
                <button onclick="doUnlock()" class="w-full py-4 btn-primary rounded-2xl text-lg shadow-lg">立即激活</button>
            </div>
            <div id="success-banner" class="main-card p-8 text-center hidden">
                <p class="text-2xl mb-2">🎉</p>
                <p class="text-emerald-800 font-black text-xl">跟着刘老师，稳过 A1</p>
            </div>
        </div>

        <div class="space-y-6">
            <div id="stage-1" onclick="go(1)" class="main-card p-6 flex items-center gap-5 relative is-locked">
                <div class="w-14 h-14 bg-emerald-800 rounded-2xl text-white flex items-center justify-center font-black text-2xl shadow-md">1</div>
                <div>
                    <h3 class="font-black text-xl text-emerald-950">名词词性捕手</h3>
                    <p id="s1-status" class="text-xs text-gray-400 font-bold tracking-widest mt-1 uppercase">Der / Die / Das 终结者</p>
                </div>
                <div id="medal-1" class="medal-icon"></div>
            </div>

            <div id="stage-2" onclick="go(2)" class="main-card p-6 flex items-center gap-5 relative is-locked">
                <div class="w-14 h-14 bg-emerald-600 rounded-2xl text-white flex items-center justify-center font-black text-2xl shadow-md">2</div>
                <div>
                    <h3 class="font-black text-xl text-emerald-950">动词变位大师</h3>
                    <p id="s2-status" class="text-xs text-red-400 font-bold tracking-widest mt-1 uppercase">未解锁</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = checkStatus;

        function checkStatus() {
            const isUnlocked = localStorage.getItem('isUnlocked') === 'true';
            const s1Done = localStorage.getItem('stage1_cleared') === 'true';

            if (isUnlocked) {
                // 1. 隐藏输入框，显示刘老师那句话
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('success-banner').style.display = 'block';
                // 2. 第一关变色
                document.getElementById('stage-1').classList.remove('is-locked');
            }

            if (s1Done) {
                // 3. 显示勋章并开启第二关
                document.getElementById('medal-1').innerText = "🥇";
                document.getElementById('stage-2').classList.remove('is-locked');
                document.getElementById('s2-status').innerText = "已开启挑战";
                document.getElementById('s2-status').className = "text-xs text-emerald-600 font-bold tracking-widest mt-1 uppercase";
            }
        }

        function doUnlock() {
            if(document.getElementById('code-input').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                checkStatus();
            } else { alert("激活码错误"); }
        }

        function go(level) {
            const unlocked = localStorage.getItem('isUnlocked') === 'true';
            const s1Done = localStorage.getItem('stage1_cleared') === 'true';

            if (level === 1) {
                if (unlocked) { window.location.href = "01-gender.html"; }
                else { alert("请先输入激活码！"); }
            } else if (level === 2) {
                if (s1Done) { window.location.href = "02-verbs.html"; }
                else { alert("请先通关第一关！"); }
            }
        }
    </script>
</body>
</html>
