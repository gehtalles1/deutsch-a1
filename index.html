<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语 A1 闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Noto+Sans+SC:wght@700;900&display=swap');
        
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; color: #064E3B; -webkit-tap-highlight-color: transparent; }
        
        /* 核心调整：限制最大宽度，在电脑端自动居中且两边留白 */
        .app-container { 
            max-width: 550px; /* 电脑端也不会显得过大 */
            margin: 0 auto;
            padding: 0 40px;
        }

        .main-card { 
            background: #FFFFFF; 
            border-radius: 50px; 
            border: 2px solid #F1EFE0; 
            box-shadow: 0 30px 80px rgba(6, 78, 59, 0.05); 
        }

        .btn-primary { background: #064E3B; color: white; font-weight: 900; }
        .locked { filter: grayscale(1); opacity: 0.3; pointer-events: none; }
        
        /* 标题：去掉斜体，拉开行高 */
        .hero-title { 
            font-size: clamp(32px, 8vw, 48px); /* 自动适配屏幕大小 */
            font-weight: 900; 
            line-height: 1.5; 
            letter-spacing: -1px;
        }
    </style>
</head>
<body class="py-20">
    <div class="app-container">
        
        <header class="text-center mb-24">
            <h1 class="hero-title text-emerald-950">
                A1 德语焦虑<br><span class="text-emerald-700">直接清零</span>
            </h1>
            <div class="h-1.5 w-12 bg-emerald-700/10 mx-auto mt-10 rounded-full"></div>
        </header>

        <div id="auth-section" class="main-card p-12 mb-20">
            <div class="flex flex-col gap-8">
                <input id="unlock-code" type="text" placeholder="输入 4 位激活码" class="w-full px-4 py-6 rounded-[2.5rem] bg-gray-50 border-none outline-none text-center font-black text-2xl text-emerald-900 ring-1 ring-gray-100 focus:ring-emerald-800 transition-all">
                <button onclick="unlock()" class="w-full py-6 btn-primary rounded-[2.5rem] shadow-xl active:scale-95 transition-all text-xl">立即解锁超级练习</button>
            </div>
        </div>

        <div class="space-y-8">
            <a id="lv1" href="01-gender.html" class="locked main-card block p-8 flex items-center gap-6 border border-gray-50/50">
                <div class="w-16 h-16 bg-emerald-800 rounded-3xl flex-shrink-0 flex items-center justify-center text-white font-black text-3xl italic shadow-lg">1</div>
                <div class="flex-1">
                    <h3 class="font-black text-2xl text-emerald-950">名词性别</h3>
                    <p class="text-[10px] font-extrabold text-emerald-800/20 tracking-[0.3em] mt-2 uppercase">Der / Die / Das</p>
                </div>
                <div class="text-2xl opacity-10 mr-2">➜</div>
            </a>
        </div>

        <footer class="mt-32 text-center pb-20">
            <p class="text-[10px] text-gray-300 font-black tracking-[0.5em] mb-6 uppercase">Lehrer Liu Nian</p>
            <div class="inline-block px-8 py-3 rounded-full border border-gray-200 text-xs font-bold text-gray-400">
                咨询微信: <span class="text-emerald-800">gehtalles</span>
            </div>
        </footer>

    </div>

    <script>
        window.onload = function() {
            if(localStorage.getItem('isUnlocked') === 'true') {
                showSuccessState();
            }
        }

        function unlock() {
            const code = document.getElementById('unlock-code').value;
            if(code === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                showSuccessState();
                playSuccessSound();
            } else {
                alert("激活码无效，请咨询微信：gehtalles");
            }
        }

        function showSuccessState() {
            document.getElementById('lv1').classList.remove('locked');
            document.getElementById('auth-section').innerHTML = `
                <div class="text-center py-10">
                    <p class="text-emerald-900 font-black text-2xl leading-relaxed">
                    🎉 解锁成功！<br><span class="text-lg opacity-40">跟着刘老师，稳过 A1</span>
                    </p>
                </div>`;
        }

        function playSuccessSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.setValueAtTime(523, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046, ctx.currentTime + 0.4);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.start(); osc.stop(ctx.currentTime + 0.4);
        }
    </script>
</body>
</html>
