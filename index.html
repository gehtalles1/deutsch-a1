<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noun Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap');
        body { background: #FFFFFF; font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .opt-btn { 
            border-radius: 24px; font-weight: 900; font-size: 26px; transition: all 0.1s ease;
            display: flex; align-items: center; justify-content: center; padding: 28px 0;
            border-bottom: 6px solid #CBD5E1;
        }
        .opt-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        
        /* 雅致三色 */
        .btn-der { background: #F0F9FF; color: #0EA5E9; border-color: #BAE6FD; }
        .btn-die { background: #FEF2F2; color: #EF4444; border-color: #FECACA; }
        .btn-das { background: #F0FDF4; color: #22C55E; border-color: #BBF7D0; }
        
        .progress-rail { height: 14px; background: #F1F5F9; border-radius: 100px; }
        .progress-fill { height: 100%; background: #58CC02; border-radius: 100px; transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-[440px] mx-auto h-screen flex flex-col">
        <div class="flex items-center gap-6 mt-6 mb-16">
            <button onclick="location.href='index.html'" class="text-[#CBD5E1] font-black text-3xl transition-colors hover:text-[#94A3B8]">✕</button>
            <div class="progress-rail flex-1 shadow-inner">
                <div id="bar" class="progress-fill shadow-sm" style="width: 10%"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-center text-center px-4">
            <h1 id="word" class="text-7xl font-black text-[#1E293B] mb-5 tracking-tight"></h1>
            <div class="w-12 h-1 bg-[#F1F5F9] mx-auto mb-5 rounded-full"></div>
            <p id="mean" class="text-2xl font-bold text-[#94A3B8]"></p>
        </div>

        <div class="grid grid-cols-1 gap-5 mb-16">
            <button onclick="play('der')" class="opt-btn btn-der">der</button>
            <button onclick="play('die')" class="opt-btn btn-die">die</button>
            <button onclick="play('das')" class="opt-btn btn-das">das</button>
        </div>
    </div>

    <audio id="s-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        const quiz = [
            {w:"Apfel", m:"苹果", a:"der"}, {w:"Banane", m:"香蕉", a:"die"},
            {w:"Kind", m:"小孩", a:"das"}, {w:"Tisch", m:"桌子", a:"der"},
            {w:"Blume", m:"花朵", a:"die"}, {w:"Auto", m:"汽车", a:"das"}
        ];
        let step = 0;

        function show() {
            document.getElementById('word').innerText = quiz[step].w;
            document.getElementById('mean').innerText = quiz[step].m;
            document.getElementById('bar').style.width = ((step + 1) / quiz.length * 100) + "%";
        }

        function play(u) {
            if(u === quiz[step].a) {
                document.getElementById('s-ok').play();
                if(step < quiz.length - 1) { step++; setTimeout(show, 250); }
                else {
                    document.getElementById('s-win').play();
                    localStorage.setItem('stage1_cleared', 'true');
                    setTimeout(() => { alert("MASTERED! ✨"); location.href='index.html'; }, 600);
                }
            } else {
                if(window.navigator.vibrate) navigator.vibrate(40);
            }
        }
        window.onload = show;
    </script>
</body>
</html>
