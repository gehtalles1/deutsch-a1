<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刘老师德语 A1 闯关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');
        body { background: #F8F7F2; font-family: 'Noto Sans SC', sans-serif; color: #064E3B; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 550px; margin: 0 auto; padding: 0 40px; }
        .main-card { background: #FFFFFF; border-radius: 40px; border: 2px solid #F1EFE0; position: relative; transition: all 0.3s; }
        .locked { filter: grayscale(1); opacity: 0.3; pointer-events: none; }
        .hero-title { font-size: clamp(32px, 8vw, 48px); font-weight: 900; line-height: 1.5; }
        /* 纯净勋章定位：确保不带任何底图数字 */
        .medal-badge { position: absolute; top: -15px; right: -15px; font-size: 3rem; z-index: 50; pointer-events: none; }
    </style>
</head>
<body class="py-16">
    <div class="app-container">
        <header class="text-center mb-16">
            <h1 class="hero-title text-emerald-950">A1 德语焦虑<br><span class="text-emerald-700">直接清零</span></h1>
        </header>

        <div id="auth-section" class="main-card p-10 mb-12 shadow-sm text-center">
            <input id="unlock-code" type="text" placeholder="输入 4 位激活码" class="w-full px-4 py-5 rounded-[2rem] bg-gray-50 border-none outline-none text-center font-black text-2xl text-emerald-900 ring-1 ring-gray-100 focus:ring-emerald-800 mb-6">
            <button onclick="unlock()" class="w-full py-5 bg-emerald-900 text-white rounded-[2rem] shadow-xl font-black text-xl active:scale-95 transition-all">立即解锁全关卡</button>
        </div>

        <div class="space-y-10">
            <div class="relative">
                <div id="medal-display-1" class="medal-badge"></div> 
                <a id="lv1" href="01-gender.html" class="locked main-card block p-8 flex items-center gap-6">
                    <div class="w-14 h-14 bg-emerald-800 rounded-2xl flex-shrink-0 flex items-center justify-center text-white font-black text-2xl">1</div>
                    <div class="flex-1">
                        <h3 class="font-black text-xl text-emerald-950">名词性别</h3>
                        <p class="text-[10px] font-extrabold text-emerald-800/30 tracking-[0.3em] mt-1">DER / DIE / DAS</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() { refreshStatus(); }

        function refreshStatus() {
            const isUnlocked = localStorage.getItem('isUnlocked') === 'true';
            const stage1Cleared = localStorage.getItem('stage1_cleared') === 'true';
            const stage1Medal = localStorage.getItem('stage1_medal');

            if(isUnlocked) {
                document.getElementById('auth-section').innerHTML = `<p class="text-emerald-900 font-black text-xl py-4">🎉 解锁成功！跟着刘老师稳过 A1</p>`;
                document.getElementById('lv1').classList.remove('locked');
            }

            // 关键：这里只渲染 Emoji 符号，不引用任何图片资源，彻底去掉数字 2
            if(stage1Cleared && stage1Medal) {
                document.getElementById('medal-display-1').innerText = (stage1Medal === 'gold') ? "🥇" : "🥈";
            }
        }

        function unlock() {
            if(document.getElementById('unlock-code').value === '8888') {
                localStorage.setItem('isUnlocked', 'true');
                refreshStatus();
            } else { alert("请输入正确的 4 位激活码"); }
        }
    </script>
</body>
</html>
