<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A1德语通关营 | 轻松搞定入门</title>
    
    <script>
        // 大门检测：防止直接输入网址进入
        if (localStorage.getItem('map_access') !== "Hallo2026") {
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            background-color: #F8FAFC;
            font-family: 'Noto Sans SC', sans-serif;
            color: #1E293B;
            -webkit-tap-highlight-color: transparent;
        }

        .premium-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-bottom: 3px solid #E2E8F0;
            border-radius: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            z-index: 10; /* 确保卡片在水印上方可点击 */
        }

        .premium-card:active {
            transform: scale(0.97);
            border-bottom-width: 1px;
        }

        /* 【修复版】水印层：采用 CSS Grid 实现文字平铺，解决溢出和消失问题 */
        #watermark-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 穿透点击，不影响操作 */
            z-index: 100;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(150px, 1fr));
            overflow: hidden;
            opacity: 0.1; /* 水印深浅控制 */
        }

        .wm-text {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: #CBD5E1;
            transform: rotate(-25deg);
            white-space: nowrap;
            user-select: none;
        }

        .gradient-text {
            background: linear-gradient(135deg, #1E293B 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="py-10 px-4">
    <div id="watermark-layer"></div>

    <div class="app-container max-w-[480px] mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black gradient-text mb-2">A1德语通关营</h1>
            <p class="text-sm text-slate-400 font-bold tracking-widest uppercase">A1 全内容・轻松学德语</p>
            <div class="w-12 h-1 bg-green-400 rounded-full mx-auto mt-4"></div>
        </header>

        <main>
            <div class="grid grid-cols-2 gap-3">
                <div id="lvl1" onclick="go(1)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#58CC02] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">1</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">名词词性捕手</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">der / die / das</p>
                    <div id="m1" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl2" onclick="go(2)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#00D4FF] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">2</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">词性规律一眼破</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Nomen-Regeln</p>
                    <div id="m2" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl3" onclick="go(3)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#A855F7] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">3</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">复数实验室</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Plural</p>
                    <div id="m3" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl4" onclick="go(4)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#F59E0B] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">4</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">弱变化动词</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Verbkonjugation</p>
                    <div id="m4" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl5" onclick="go(5)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#F43F5E] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">5</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">强变化动词</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Starke Verben</p>
                    <div id="m5" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl6" onclick="go(6)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#0EA5E9] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">6</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">可分动词</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Trennbare</p>
                    <div id="m6" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl7" onclick="go(7)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#D97706] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">7</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">情态动词</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Modalverben</p>
                    <div id="m7" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl8" onclick="go(8)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#6366F1] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">8</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">现在时应用</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Präsens-Mix</p>
                    <div id="m8" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl9" onclick="go(9)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#F97316] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">9</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">现在完成时</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Perfekt Master</p>
                    <div id="m9" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>

                <div id="lvl10" onclick="go(10)" class="premium-card p-4 flex flex-col items-center text-center relative">
                    <div class="w-12 h-12 bg-[#0D9488] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-inner">10</div>
                    <h3 class="text-sm font-bold text-slate-800 leading-tight">一格四格基础</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">Nom. & Akk.</p>
                    <div id="m10" class="absolute -top-2 -right-2 text-3xl"></div>
                </div>
                </div>
        </main>

        <footer class="mt-12 text-center pb-10">
            <div class="inline-flex items-center px-6 py-2 bg-white border border-slate-200 rounded-full shadow-sm mb-6">
                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">咨询微信:</span>
                <span class="text-xs font-black text-slate-500 ml-2">gehtalles</span>
            </div>
        </footer>
    </div>

    <script>
        // 生成平铺水印文字
        function createWatermark() {
            const container = document.getElementById('watermark-layer');
            const count = 50; // 生成足够多的格子覆盖长页面
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'wm-text';
                div.innerText = '版权授权：gehtalles刘老师德语';
                container.appendChild(div);
            }
        }

        function checkStatus() {
            // 移除了 8888 激活码检查逻辑
            // 直接展示勋章进度
            const s1Score = localStorage.getItem('stage1_score'); 
            if (s1Score === 'gold') document.getElementById('m1').innerText = "🥇";
            // ...其他勋章逻辑保持不变
        }

        function go(n) {
            // 移除了解锁标记检查，直接允许访问
            const pages = {
                1: '01-gender.html', 2: '02-classify.html', 3: '03-plural.html', 4: '04-verbs.html',
                5: '05-starke-verben.html', 6: '06-trennbare-verben.html', 7: '07-modalverben.html',
                8: '08-praesens-mix.html', 9: '09-Perfekt-Master.html', 10: '10_Artikel_Check.html'
                // ...介词等其他页面映射保持不变
            };
            if(pages[n]) window.location.href = pages[n];
        }

        // 安全屏蔽
        document.oncontextmenu = function() { return false; };
        
        window.onload = function() {
            createWatermark(); // 执行生成水印
            checkStatus();
        };
    </script>
</body>
</html>
