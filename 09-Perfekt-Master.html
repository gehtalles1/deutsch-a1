<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>德语完成时 · 专项训练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        
        /* 关键修复：使用 dvh (动态视口高度) 解决 iOS 遮挡问题 */
        body { 
            background: #000; 
            font-family: 'Noto Sans SC', sans-serif; 
            margin: 0; 
            width: 100vw; 
            min-height: 100dvh; 
            overflow-y: auto; /* 允许纵向溢出时滚动，防止死锁 */
            color: #FFF; 
            -webkit-overflow-scrolling: touch;
        }

        .app-container { 
            width: 100%; 
            max-width: 430px; 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            padding: 0 20px 40px; /* 底部增加内边距 */
            margin: 0 auto; 
        }

        .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 5px 10px; }
        .nav-icon { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        
        /* 调整卡片大小，适配小屏幕 */
        #main-card { 
            width: 100%; 
            padding: 30px 20px; 
            background: rgba(255, 255, 255, 0.04); 
            border-radius: 35px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .sentence-text { font-size: 1.3rem; font-weight: 800; line-height: 2; text-align: center; color: #FFFFFF; }
        .sentence-text b { color: #38BDF8; border-bottom: 3px solid #38BDF8; padding: 0 8px; margin: 0 4px; min-width: 80px; display: inline-block; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .correct-active { color: #4ADE80 !important; border-bottom-color: #4ADE80 !important; transform: scale(1.05); text-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }

        /* 优化选项按钮在 iPad 上的表现 */
        .glass-orb { 
            height: 70px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 1.1rem; 
            font-weight: 900; 
            color: #D4AF37; 
        }
        .glass-orb.selected { background: #D4AF37; color: #000; border-color: #FFF; }
        .is-checking .glass-orb { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="nav-bar">
            <div class="nav-icon" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </div>
            <div class="flex-grow mx-4 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                <div id="progress-fill" class="h-full bg-yellow-600 transition-all duration-500 w-0"></div>
            </div>
            <div class="nav-icon" id="mute-btn" onclick="toggleMute()">
                <svg id="speaker-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </div>
        </div>
        
        <div id="cur-step" class="text-center text-xs font-black text-zinc-600 mb-4 tracking-widest">1 / 30</div>

        <div class="flex-grow flex flex-col justify-center" id="game-body">
            <div class="text-center mb-6">
                <h1 id="verb-display" class="text-4xl font-black tracking-tight mb-2"></h1>
                <p id="verb-cn" class="text-zinc-500 font-bold"></p>
            </div>

            <div id="main-card" class="mb-8">
                <div id="emoji-icon" class="text-6xl mb-6 text-center"></div>
                <div class="sentence-text" id="sentence-box"></div>
            </div>

            <div class="grid grid-cols-2 gap-3" id="orb-box"></div>
        </div>
    </div>

    <div id="congrats-modal" class="hidden fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-6 text-center">
        <div class="bg-zinc-900 p-10 rounded-[50px] w-full max-w-[360px] border-2 border-yellow-600/50">
            <div class="text-8xl mb-6">🏆</div>
            <h2 class="text-3xl font-black text-yellow-500 mb-4">通关大吉!</h2>
            <p class="text-zinc-400 mb-8">30道练习全部完成，德语水平UP！</p>
            <button onclick="window.location.href='index.html'" class="w-full py-5 bg-yellow-600 text-white rounded-2xl font-black text-xl">确认并返回</button>
        </div>
    </div>

    <div id="error-modal" class="hidden fixed inset-0 bg-black/98 z-[9999] flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-[340px] text-center border border-red-900/30">
            <div class="text-5xl mb-4">👩‍🏫</div>
            <p class="text-yellow-500 font-black mb-4 text-xl">哎呀，写错了</p>
            <div id="teacher-advice" class="text-zinc-400 text-sm mb-10 text-left border-l-4 border-yellow-700 pl-4 leading-relaxed whitespace-pre-line"></div>
            <button onclick="tryAgain()" class="w-full py-4 bg-zinc-800 text-white rounded-2xl font-black">再试一次</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;

        function playSound(type) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'select') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'correct') { osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.3); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('speaker-icon').innerHTML = isMuted ? '<path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/>' : '<path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
        }

        const rawData = [
            {q: "Ich [?] gestern Pizza [?].", v: "essen", cn: "吃", ans: ["habe", "gegessen"], icon: "🍕", auxTip: "及物动词用 haben。", partTip: "essen 变 gegessen。"},
            {q: "Warum [?] du gestern so spät [?]? ", v: "kommen", cn: "来", ans: ["bist", "gekommen"], icon: "🎉", auxTip: "‘来’是位移词，主语du对应bist。", partTip: "kommen 分词不变音。"},
            {q: "Er [?] nach Berlin [?].", v: "fahren", cn: "开车/去", ans: ["ist", "gefahren"], icon: "🚄", auxTip: "位移词选 sein。", partTip: "fahren -> gefahren。"},
            {q: "Wir [?] den ganzen Tag [?].", v: "arbeiten", cn: "工作", ans: ["haben", "gearbeitet"], icon: "💻", auxTip: "工作无位移，选 haben。", partTip: "t结尾加 et。"},
            {q: "Ich [?] um 6 Uhr [?].", v: "aufstehen", cn: "起床", ans: ["bin", "aufgestanden"], icon: "⏰", auxTip: "状态改变选 sein。", partTip: "auf-ge-standen。"},
            {q: "[?] du das Buch [?]?", v: "lesen", cn: "读", ans: ["hast", "gelesen"], icon: "📖", auxTip: "读书选 haben。", partTip: "lesen -> gelesen。"},
            {q: "Ich [?] den Schlüssel [?].", v: "suchen", cn: "找", ans: ["habe", "gesucht"], icon: "🔑", auxTip: "及物选 haben。", partTip: "规则：gesucht。"},
            {q: "Wir [?] am Wochenende [?].", v: "tanzen", cn: "跳舞", ans: ["haben", "getanzt"], icon: "💃", auxTip: "原地动作选 haben。", partTip: "规则：getanzt。"},
            {q: "Er [?] Wasser [?].", v: "trinken", cn: "喝", ans: ["hat", "getrunken"], icon: "💧", auxTip: "及物选 haben。", partTip: "i -> u: getrunken。"},
            {q: "Wann [?] du den Brief [?]?", v: "schreiben", cn: "写", ans: ["hast", "geschrieben"], icon: "✉️", auxTip: "写信选 haben。", partTip: "ei -> ie: geschrieben。"},
            {q: "Das Kind [?] schnell [?].", v: "einschlafen", cn: "入睡", ans: ["ist", "eingeschlafen"], icon: "💤", auxTip: "状态改变选 sein。", partTip: "ein-ge-schlafen。"},
            {q: "Was [?] am Montag [?]? ", v: "passieren", cn: "发生", ans: ["ist", "passiert"], icon: "❓", auxTip: "‘发生’固定选 sein。", partTip: "ieren不加ge。"},
            {q: "Ich [?] meine Tasche [?].", v: "vergessen", cn: "忘记", ans: ["habe", "vergessen"], icon: "✍️", auxTip: "心理动作选 haben。", partTip: "ver不加ge。"},
            {q: "Sie [?] mit dem Lehrer [?].", v: "sprechen", cn: "说", ans: ["hat", "gesprochen"], icon: "🗣️", auxTip: "说话选 haben。", partTip: "e -> o: gesprochen。"},
            {q: "Ich [?] gestern 5 km [?].", v: "laufen", cn: "跑", ans: ["bin", "gelaufen"], icon: "👟", auxTip: "位移选 sein。", partTip: "laufen -> gelaufen。"},
            {q: "Wir [?] ein neues Haus [?].", v: "bauen", cn: "造", ans: ["haben", "gebaut"], icon: "🏗️", auxTip: "及物选 haben。", partTip: "规则：gebaut。"},
            {q: "Ich [?] ein Geschenk [?].", v: "bekommen", cn: "收到", ans: ["habe", "bekommen"], icon: "🎁", auxTip: "及物选 haben。", partTip: "be不加ge。"},
            {q: "Wann [?] ihr [?]? ", v: "ankommen", cn: "到达", ans: ["seid", "angekommen"], icon: "🚉", auxTip: "位移终点选 sein。", partTip: "an-ge-kommen。"},
            {q: "Ich [?] im Pool [?].", v: "schwimmen", cn: "游泳", ans: ["bin", "geschwommen"], icon: "🌊", auxTip: "位移选 sein。", partTip: "强变化：geschwommen。"},
            {q: "Ich [?] drei Tage [?].", v: "bleiben", cn: "停留", ans: ["bin", "geblieben"], icon: "📅", auxTip: "停留固定选 sein。", partTip: "ei -> ie: geblieben。"},
            {q: "Wir [?] Radio [?].", v: "hören", cn: "听", ans: ["haben", "gehört"], icon: "📻", auxTip: "听选 haben。", partTip: "规则：gehört。"},
            {q: "Er [?] mir [?].", v: "helfen", cn: "帮助", ans: ["hat", "geholfen"], icon: "🤝", auxTip: "及物选 haben。", partTip: "e -> o: geholfen。"},
            {q: "Ich [?] dich [?].", v: "sehen", cn: "看", ans: ["habe", "gesehen"], icon: "🎬", auxTip: "及物选 haben。", partTip: "sehen不变音。"},
            {q: "Sie [?] in die Stadt [?].", v: "gehen", cn: "走", ans: ["ist", "gegangen"], icon: "🚶", auxTip: "位移选 sein。", partTip: "gehen -> gegangen。"},
            {q: "Ich [?] das Fenster [?].", v: "aufmachen", cn: "打开", ans: ["habe", "aufgemacht"], icon: "🔓", auxTip: "及物选 haben。", partTip: "auf-ge-macht。"},
            {q: "Wir [?] gestern [?].", v: "spielen", cn: "玩", ans: ["haben", "gespielt"], icon: "⚽", auxTip: "及物选 haben。", partTip: "规则：gespielt。"},
            {q: "Er [?] ein Auto [?].", v: "kaufen", cn: "买", ans: ["hat", "gekauft"], icon: "🚗", auxTip: "及物选 haben。", partTip: "规则：gekauft。"},
            {q: "Ich [?] Suppe [?].", v: "kochen", cn: "做饭", ans: ["habe", "gekocht"], icon: "🍳", auxTip: "做饭选 haben。", partTip: "规则：gekocht。"},
            {q: "Wir [?] Deutsch [?].", v: "lernen", cn: "学习", ans: ["haben", "gelernt"], icon: "📚", auxTip: "学习选 haben。", partTip: "规则：gelernt。"},
            {q: "Sie [?] uns [?].", v: "besuchen", cn: "拜访", ans: ["hat", "besucht"], icon: "🏠", auxTip: "拜访选 haben。", partTip: "be开头不加ge。"}
        ];

        let curIdx = 0; let inputs = [null, null]; let selectedQuests = []; let isChecking = false;

        function init() { selectedQuests = rawData.sort(() => Math.random() - 0.5); render(); }

        function render() {
            isChecking = false; document.getElementById('game-body').classList.remove('is-checking');
            const data = selectedQuests[curIdx]; inputs = [null, null];
            document.getElementById('progress-fill').style.width = `${((curIdx+1)/30)*100}%`;
            document.getElementById('cur-step').innerText = `${curIdx + 1} / 30`;
            document.getElementById('verb-display').innerText = data.v;
            document.getElementById('verb-cn').innerText = `意思：${data.cn}`;
            document.getElementById('emoji-icon').innerText = data.icon;
            
            const parts = data.q.split('[?]');
            document.getElementById('sentence-box').innerHTML = `<span>${parts[0]}</span><b id="s0">?</b><span>${parts[1]}</span><span class="inline-block"><b id="s1">?</b><span>${parts[2]||""}</span></span>`;
            
            const correctAux = data.ans[0];
            const correctPart = data.ans[1];
            
            const wrongAux = correctAux.match(/hab|has|hat/i) ? 
                (correctAux === "habe" ? "bin" : (correctAux === "hast" ? "bist" : "ist")) : 
                (correctAux === "bin" ? "habe" : (correctAux === "bist" ? "hast" : "hat"));

            let wrongPart = correctPart.endsWith('en') ? correctPart.replace(/en$/, 't') : correctPart.replace(/t$/, 'en');
            if (!correctPart.startsWith('ge') && !correctPart.match(/^(be|ver|er|ent|ge|passiert)/)) {
                wrongPart = "ge" + correctPart;
            }

            const opts = [correctAux, correctPart, wrongAux, wrongPart].sort(() => Math.random() - 0.5);
            document.getElementById('orb-box').innerHTML = opts.map(t => `<div class="glass-orb" onclick="sel('${t}', this)">${t}</div>`).join('');
            
            // 每次渲染回到顶部，防止 iPad 滚动错位
            window.scrollTo(0,0);
        }

        window.sel = function(val, el) {
            if (isChecking) return;
            let idx = inputs[0] === null ? 0 : (inputs[1] === null ? 1 : -1);
            if (idx === -1 || el.classList.contains('selected')) return;
            playSound('select'); el.classList.add('selected'); inputs[idx] = val;
            document.getElementById(`s${idx}`).innerText = val; document.getElementById(`s${idx}`).style.color = "#FFF";
            if (inputs[0] && inputs[1]) setTimeout(check, 300);
        }

        function check() {
            isChecking = true;
            const data = selectedQuests[curIdx];
            const correct = (inputs[0].toLowerCase() === data.ans[0].toLowerCase() && inputs[1].toLowerCase() === data.ans[1].toLowerCase());
            
            if (correct) {
                playSound('correct');
                document.getElementById('s0').classList.add('correct-active');
                document.getElementById('s1').classList.add('correct-active');
                setTimeout(() => { 
                    if (curIdx >= 29) celebrate(); 
                    else { curIdx++; render(); } 
                }, 2000); 
            } else { 
                playSound('wrong'); 
                showError(data); 
            }
        }

        function showError(data) {
            document.getElementById('teacher-advice').innerText = `${data.auxTip}\n\n${data.partTip}`;
            document.getElementById('error-modal').classList.remove('hidden');
        }

        function celebrate() {
            localStorage.setItem('level9_cleared', 'true');
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#D4AF37','#38BDF8'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#D4AF37','#38BDF8'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
            setTimeout(() => { document.getElementById('congrats-modal').classList.remove('hidden'); }, 500);
        }

        window.tryAgain = () => { document.getElementById('error-modal').classList.add('hidden'); render(); };
        init();
    </script>
</body>
</html>
